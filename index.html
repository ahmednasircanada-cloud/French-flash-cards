{id:'core_pronouns',emoji:'🔑',name:'Mots Essentiels 1',color:'#0e6655',cards:[
{f:'moi',p:'MWAH',e:'me',s:'C\'est moi qui ai préparé le café ce matin.',st:'It\'s me who made the coffee this morning.',tip:'Stressed pronoun — used after prepositions or for emphasis.'},
{f:'toi',p:'TWAH',e:'you (informal)',s:'Et toi, tu viens avec nous?',st:'And you, are you coming with us?',tip:'Stressed form of tu — used for emphasis or after prepositions.'},
{f:'lui',p:'LWEE',e:'him',s:'C\'est pour lui, ce cadeau.',st:'This gift is for him.',tip:'Also means \'to him/her\' as an indirect object pronoun.'},
{f:'elle',p:'EL',e:'she / her',s:'Elle habite à Calgary depuis un an.',st:'She has lived in Calgary for a year.',tip:'Subject pronoun for a female person or feminine noun.'},
{f:'nous',p:'NOO',e:'we / us',s:'Nous parlons français ensemble chaque semaine.',st:'We speak French together every week.',tip:'Also used as object pronoun: \'to us\'.'},
{f:'vous',p:'VOO',e:'you (formal/plural)',s:'Vous êtes très patient avec moi.',st:'You are very patient with me.',tip:'Formal singular or plural — always safe with strangers.'},
{f:'eux',p:'UH',e:'them (masc.)',s:'Je vais chez eux ce soir.',st:'I\'m going to their place tonight.',tip:'Stressed pronoun for masculine/mixed plural.'},
{f:'ceci',p:'suh-SEE',e:'this',s:'Ceci est important pour l\'examen.',st:'This is important for the exam.',tip:'More formal than \'ça\' — used in writing.'},
{f:'cela / ça',p:'suh-LA / SA',e:'that / this',s:'Ça va coûter combien?',st:'How much will that cost?',tip:'\'Ça\' is the everyday spoken form of \'cela\'.'},
{f:'quelque chose',p:'kel-kuh SHOHZ',e:'something',s:'Je voudrais dire quelque chose.',st:'I would like to say something.',tip:'Opposite is \'rien\' (nothing).'},
{f:'quelqu\'un',p:'kel-KUH',e:'someone',s:'Il y a quelqu\'un à la porte.',st:'There\'s someone at the door.',tip:'Opposite is \'personne\' (no one).'},
{f:'rien',p:'RYEHN',e:'nothing',s:'Je n\'ai rien compris.',st:'I understood nothing.',tip:'Used with \'ne\': ne...rien = nothing.'},
{f:'personne',p:'pehr-SON',e:'no one / nobody',s:'Personne ne répond au téléphone.',st:'No one is answering the phone.',tip:'Also means \'a person\' — context makes it clear.'},
{f:'tout',p:'TOO',e:'everything / all',s:'J\'ai tout compris pendant le cours.',st:'I understood everything during the class.',tip:'Agrees in gender/number: tout, toute, tous, toutes.'},
{f:'chaque',p:'SHAK',e:'each / every',s:'Chaque étudiant doit faire l\'exercice.',st:'Each student must do the exercise.',tip:'Always singular, never plural.'},
{f:'même',p:'MEM',e:'same / even',s:'Nous avons le même professeur.',st:'We have the same teacher.',tip:'Also means \'even\': même moi = even me.'},
{f:'autre',p:'OH-tr',e:'other',s:'J\'ai besoin d\'un autre stylo.',st:'I need another pen.',tip:'Un autre / une autre = another one.'},
{f:'plusieurs',p:'plew-ZYUHR',e:'several',s:'Plusieurs personnes attendent dehors.',st:'Several people are waiting outside.',tip:'Always plural, invariable in gender.'},
{f:'beaucoup',p:'boh-KOO',e:'a lot / many',s:'Il y a beaucoup de monde ici.',st:'There are a lot of people here.',tip:'Followed by \'de\' before a noun: beaucoup de temps.'},
{f:'un peu',p:'uhn PUH',e:'a little',s:'Je parle un peu français.',st:'I speak a little French.',tip:'Un peu de + noun: un peu de patience.'},
{f:'assez',p:'a-SAY',e:'enough / rather',s:'C\'est assez difficile pour moi.',st:'It\'s rather difficult for me.',tip:'Assez de + noun = enough of something.'},
{f:'trop',p:'TROH',e:'too much / too',s:'Ce cours est trop rapide pour moi.',st:'This class is too fast for me.',tip:'Trop de + noun = too much/many.'},
]},

{id:'core_verbs',emoji:'🧠',name:'Verbes Essentiels TCF',color:'#7d3c98',cards:[
{f:'vouloir',p:'voo-LWAHR',e:'to want',s:'Je veux réussir mon examen de français.',st:'I want to pass my French exam.',tip:'Je veux, tu veux, il veut, nous voulons, vous voulez, ils veulent.'},
{f:'pouvoir',p:'poo-VWAHR',e:'to be able to / can',s:'Est-ce que je peux poser une question?',st:'Can I ask a question?',tip:'Je peux, tu peux, il peut, nous pouvons, vous pouvez, ils peuvent.'},
{f:'devoir',p:'duh-VWAHR',e:'to have to / must',s:'Je dois étudier ce soir.',st:'I have to study tonight.',tip:'Je dois, tu dois, il doit, nous devons, vous devez, ils doivent.'},
{f:'savoir',p:'sa-VWAHR',e:'to know (a fact/how to)',s:'Je ne sais pas la réponse.',st:'I don\'t know the answer.',tip:'Je sais, tu sais, il sait, nous savons, vous savez, ils savent.'},
{f:'connaître',p:'ko-NEH-tr',e:'to know (a person/place)',s:'Je connais bien ce quartier.',st:'I know this neighborhood well.',tip:'Use savoir for facts, connaître for people/places.'},
{f:'venir',p:'vuh-NEER',e:'to come',s:'Tu viens à la fête samedi?',st:'Are you coming to the party Saturday?',tip:'Je viens, tu viens, il vient, nous venons, vous venez, ils viennent.'},
{f:'prendre',p:'PRON-dr',e:'to take',s:'Je prends le bus tous les matins.',st:'I take the bus every morning.',tip:'Je prends, tu prends, il prend, nous prenons, vous prenez, ils prennent.'},
{f:'mettre',p:'MET-tr',e:'to put / to put on',s:'Elle met son manteau avant de sortir.',st:'She puts on her coat before going out.',tip:'Je mets, tu mets, il met, nous mettons, vous mettez, ils mettent.'},
{f:'dire',p:'DEER',e:'to say / to tell',s:'Qu\'est-ce que tu veux dire?',st:'What do you mean?',tip:'Je dis, tu dis, il dit, nous disons, vous dites, ils disent.'},
{f:'voir',p:'VWAHR',e:'to see',s:'Je vois mes collègues au bureau.',st:'I see my colleagues at the office.',tip:'Je vois, tu vois, il voit, nous voyons, vous voyez, ils voient.'},
{f:'croire',p:'KRWAHR',e:'to believe / think',s:'Je crois que c\'est une bonne idée.',st:'I believe it\'s a good idea.',tip:'Je crois, tu crois, il croit, nous croyons, vous croyez, ils croient.'},
{f:'penser',p:'pon-SAY',e:'to think',s:'Je pense que le cours commence à midi.',st:'I think the class starts at noon.',tip:'Penser à = to think about; penser de = to have an opinion about.'},
{f:'aimer',p:'eh-MAY',e:'to like / to love',s:'J\'aime beaucoup les cours de français.',st:'I really like the French classes.',tip:'Regular -ER verb — one of the first verbs beginners learn.'},
{f:'chercher',p:'shehr-SHAY',e:'to look for',s:'Je cherche mes clés partout.',st:'I\'m looking for my keys everywhere.',tip:'No preposition needed: chercher quelque chose, not \'chercher pour\'.'},
{f:'trouver',p:'troo-VAY',e:'to find',s:'J\'ai trouvé un bon appartement.',st:'I found a good apartment.',tip:'Se trouver = to be located: la gare se trouve ici.'},
{f:'donner',p:'do-NAY',e:'to give',s:'Peux-tu me donner ton numéro?',st:'Can you give me your number?',tip:'Donner quelque chose à quelqu\'un = to give something to someone.'},
{f:'demander',p:'duh-mon-DAY',e:'to ask (for)',s:'Je vais demander de l\'aide au professeur.',st:'I\'m going to ask the teacher for help.',tip:'Demander quelque chose, not \'demander pour quelque chose\'.'},
{f:'répondre',p:'ray-PON-dr',e:'to answer',s:'Il répond toujours vite à mes messages.',st:'He always answers my messages quickly.',tip:'Répondre à quelqu\'un/quelque chose.'},
{f:'arriver',p:'a-ree-VAY',e:'to arrive / to happen',s:'Le train arrive à quelle heure?',st:'What time does the train arrive?',tip:'Also means \'to happen\': qu\'est-ce qui arrive?'},
{f:'rester',p:'res-TAY',e:'to stay',s:'Je reste à la maison ce week-end.',st:'I\'m staying home this weekend.',tip:'Conjugated with être in the passé composé.'},
{f:'passer',p:'pa-SAY',e:'to pass / to spend (time)',s:'J\'ai passé une bonne journée.',st:'I had a good day.',tip:'Passer du temps = to spend time.'},
{f:'commencer',p:'ko-mon-SAY',e:'to start',s:'Le cours commence à onze heures.',st:'The class starts at eleven.',tip:'Commencer à + infinitive = to start doing something.'},
{f:'finir',p:'fee-NEER',e:'to finish',s:'Je finis mon travail à cinq heures.',st:'I finish my work at five o\'clock.',tip:'Regular -IR verb — je finis, tu finis, il finit...'},
{f:'essayer',p:'eh-say-YAY',e:'to try',s:'J\'essaie de parler français chaque jour.',st:'I try to speak French every day.',tip:'Essayer de + infinitive = to try to do something.'},
{f:'utiliser',p:'ew-tee-lee-ZAY',e:'to use',s:'J\'utilise une application pour étudier.',st:'I use an app to study.',tip:'Regular -ER verb.'},
{f:'travailler',p:'tra-va-YAY',e:'to work',s:'Je travaille comme ingénieur en logiciel.',st:'I work as a software engineer.',tip:'Travailler dans/pour/chez + employer.'},
{f:'habiter',p:'a-bee-TAY',e:'to live (reside)',s:'J\'habite à Calgary depuis 2025.',st:'I\'ve lived in Calgary since 2025.',tip:'Habiter à/en + city/country.'},
{f:'parler',p:'par-LAY',e:'to speak',s:'Je parle anglais, hindi et un peu français.',st:'I speak English, Hindi, and a little French.',tip:'Regular -ER verb, one of the most useful.'},
{f:'comprendre',p:'kom-PRON-dr',e:'to understand',s:'Je comprends mieux quand tu parles lentement.',st:'I understand better when you speak slowly.',tip:'Same pattern as prendre and apprendre.'},
{f:'apprendre',p:'a-PRON-dr',e:'to learn',s:'J\'apprends le français pour l\'immigration.',st:'I\'m learning French for immigration purposes.',tip:'Apprendre à + infinitive = to learn to do something.'},
{f:'falloir (il faut)',p:'eel FOH',e:'to be necessary',s:'Il faut étudier chaque jour.',st:'One must study every day.',tip:'Impersonal verb — only used as \'il faut\'.'},
]},

{id:'question_connectors',emoji:'❓',name:'Interrogatifs & Connecteurs',color:'#1f618d',cards:[
{f:'qui',p:'KEE',e:'who',s:'Qui est ton professeur de français?',st:'Who is your French teacher?',tip:'Can also mean \'that/who\' as a relative pronoun.'},
{f:'que / qu\'est-ce que',p:'kuh / kes-kuh',e:'what',s:'Qu\'est-ce que tu fais ce soir?',st:'What are you doing tonight?',tip:'\'Que\' before a vowel becomes \'qu\'\'.'},
{f:'quoi',p:'KWAH',e:'what (informal/after prep.)',s:'Tu parles de quoi?',st:'What are you talking about?',tip:'Used after a preposition or alone: Quoi de neuf?'},
{f:'où',p:'OO',e:'where',s:'Où habites-tu à Calgary?',st:'Where do you live in Calgary?',tip:'Note the accent — \'ou\' without it means \'or\'.'},
{f:'quand',p:'KON',e:'when',s:'Quand est ton prochain cours de français?',st:'When is your next French class?',tip:'Common in TCF listening sections.'},
{f:'comment',p:'ko-MON',e:'how',s:'Comment vas-tu aujourd\'hui?',st:'How are you today?',tip:'Also means \'what\' when asking someone to repeat: Comment?'},
{f:'pourquoi',p:'poor-KWAH',e:'why',s:'Pourquoi apprends-tu le français?',st:'Why are you learning French?',tip:'Answered with \'parce que\' (because).'},
{f:'combien',p:'kom-BYEHN',e:'how much / how many',s:'Combien coûte ce livre?',st:'How much does this book cost?',tip:'Combien de + noun = how many/much of something.'},
{f:'quel / quelle',p:'KEL',e:'which / what',s:'Quelle heure est-il?',st:'What time is it?',tip:'Agrees in gender and number with the noun.'},
{f:'parce que',p:'par-suh-KUH',e:'because',s:'J\'étudie le français parce que je veux immigrer.',st:'I study French because I want to immigrate.',tip:'Becomes \'parce qu\'\' before a vowel.'},
{f:'donc',p:'DONK',e:'so / therefore',s:'Il pleut, donc je reste à la maison.',st:'It\'s raining, so I\'m staying home.',tip:'Used to show a result or conclusion.'},
{f:'mais',p:'MEH',e:'but',s:'J\'aime le français, mais c\'est difficile.',st:'I like French, but it\'s difficult.',tip:'One of the most common connectors in speech.'},
{f:'ou',p:'OO',e:'or',s:'Tu préfères le thé ou le café?',st:'Do you prefer tea or coffee?',tip:'No accent — different from \'où\' (where).'},
{f:'et',p:'AY',e:'and',s:'Je parle anglais et français.',st:'I speak English and French.',tip:'The \'t\' is silent.'},
{f:'si',p:'SEE',e:'if / yes (to a negative)',s:'Si tu étudies, tu vas réussir.',st:'If you study, you will succeed.',tip:'Also used to contradict a negative question.'},
{f:'alors',p:'a-LOR',e:'so / then',s:'Alors, on commence le cours?',st:'So, shall we start the class?',tip:'Very common filler/connector in spoken French.'},
{f:'ensuite',p:'on-SWEET',e:'then / next',s:'D\'abord je révise, ensuite je pratique.',st:'First I review, then I practice.',tip:'Useful for sequencing ideas in TCF speaking.'},
{f:'puis',p:'PWEE',e:'then / afterward',s:'On mange, puis on regarde un film.',st:'We eat, then we watch a movie.',tip:'Similar to \'ensuite\' but slightly more literary.'},
{f:'aussi',p:'oh-SEE',e:'also / too',s:'Moi aussi, j\'apprends le français!',st:'Me too, I\'m learning French!',tip:'Placed after the verb or at the start for emphasis.'},
{f:'encore',p:'on-KOR',e:'again / still',s:'Peux-tu répéter encore une fois?',st:'Can you repeat one more time?',tip:'Pas encore = not yet.'},
{f:'déjà',p:'day-ZHA',e:'already',s:'J\'ai déjà fini mes devoirs.',st:'I already finished my homework.',tip:'Common in passé composé sentences.'},
{f:'jamais',p:'zha-MEH',e:'never',s:'Je ne suis jamais allé à Paris.',st:'I have never been to Paris.',tip:'Used with \'ne\': ne...jamais.'},
{f:'toujours',p:'too-ZHOOR',e:'always / still',s:'Je suis toujours à l\'heure au travail.',st:'I am always on time at work.',tip:'Also means \'still\': il travaille toujours ici.'},
{f:'souvent',p:'soo-VON',e:'often',s:'Je pratique souvent avec des flashcards.',st:'I often practice with flashcards.',tip:'Common adverb of frequency for TCF speaking.'},
{f:'parfois',p:'par-FWAH',e:'sometimes',s:'Parfois, je regarde des films en français.',st:'Sometimes I watch movies in French.',tip:'Synonym: quelquefois.'},
{f:'maintenant',p:'man-tuh-NON',e:'now',s:'Maintenant, je dois partir.',st:'Now, I have to leave.',tip:'Very common transition word.'},
{f:'aujourd\'hui',p:'oh-zhoor-DWEE',e:'today',s:'Aujourd\'hui, j\'ai un cours de français.',st:'Today, I have a French class.',tip:'Literally \'on the day of today\'.'},
{f:'hier',p:'YEHR',e:'yesterday',s:'Hier, j\'ai étudié la négation.',st:'Yesterday, I studied negation.',tip:'Pairs with passé composé.'},
{f:'demain',p:'duh-MAN',e:'tomorrow',s:'Demain, j\'ai un examen blanc.',st:'Tomorrow, I have a practice exam.',tip:'À demain! = See you tomorrow!'},
]},

{id:'prepositions_place_time',emoji:'🧭',name:'Prépositions & Repères',color:'#b9770e',cards:[
{f:'avec',p:'a-VEK',e:'with',s:'Je pratique le français avec mon professeur.',st:'I practice French with my teacher.',tip:'One of the most frequent prepositions.'},
{f:'sans',p:'SON',e:'without',s:'Je ne peux pas réussir sans pratiquer.',st:'I can\'t succeed without practicing.',tip:'Sans + infinitive = without doing something.'},
{f:'pour',p:'POOR',e:'for',s:'J\'étudie le français pour l\'immigration.',st:'I\'m studying French for immigration.',tip:'Pour + infinitive = in order to.'},
{f:'pendant',p:'pon-DON',e:'during / for (duration)',s:'J\'ai étudié pendant deux heures.',st:'I studied for two hours.',tip:'Used for a completed duration.'},
{f:'depuis',p:'duh-PWEE',e:'since / for',s:'J\'habite au Canada depuis 2025.',st:'I\'ve lived in Canada since 2025.',tip:'Used with present tense for ongoing actions.'},
{f:'avant',p:'a-VON',e:'before',s:'Je révise avant chaque cours.',st:'I review before every class.',tip:'Avant de + infinitive = before doing something.'},
{f:'après',p:'a-PREH',e:'after',s:'On se retrouve après le cours?',st:'Shall we meet after class?',tip:'Après avoir/être + past participle = after having done.'},
{f:'chez',p:'SHAY',e:'at (someone\'s) place',s:'Je vais chez mes amis ce soir.',st:'I\'m going to my friends\' place tonight.',tip:'Chez moi/toi/lui = at my/your/his place.'},
{f:'dans',p:'DON',e:'in',s:'Le livre est dans mon sac.',st:'The book is in my bag.',tip:'Also used for future time: dans une heure = in an hour.'},
{f:'sur',p:'SEWR',e:'on',s:'Le stylo est sur la table.',st:'The pen is on the table.',tip:'Also used figuratively: un cours sur la grammaire.'},
{f:'sous',p:'SOO',e:'under',s:'Le chat dort sous la chaise.',st:'The cat is sleeping under the chair.',tip:'Opposite of \'sur\'.'},
{f:'entre',p:'ON-tr',e:'between',s:'Le cours est entre 10h et 11h.',st:'The class is between 10am and 11am.',tip:'Entre + two nouns joined by \'et\'.'},
{f:'devant',p:'duh-VON',e:'in front of',s:'On se retrouve devant la bibliothèque.',st:'Let\'s meet in front of the library.',tip:'Opposite of \'derrière\'.'},
{f:'derrière',p:'deh-RYEHR',e:'behind',s:'Le parking est derrière le bâtiment.',st:'The parking lot is behind the building.',tip:'Opposite of \'devant\'.'},
{f:'ici',p:'ee-SEE',e:'here',s:'Je travaille ici depuis un an.',st:'I\'ve worked here for a year.',tip:'Opposite of \'là-bas\'.'},
{f:'là-bas',p:'la-BAH',e:'over there',s:'Mes parents habitent là-bas, en Inde.',st:'My parents live over there, in India.',tip:'Used for a location farther away.'},
{f:'près (de)',p:'PREH',e:'near / close (to)',s:'J\'habite près du centre-ville.',st:'I live near downtown.',tip:'Près de + noun = near something.'},
{f:'loin (de)',p:'LWAN',e:'far (from)',s:'Le bureau est loin de chez moi.',st:'The office is far from my place.',tip:'Opposite of \'près de\'.'},
{f:'vers',p:'VEHR',e:'toward / around (time)',s:'On arrive vers midi.',st:'We\'re arriving around noon.',tip:'Vers + time = approximately at that time.'},
{f:'jusqu\'à',p:'zhews-KA',e:'until / up to',s:'J\'étudie jusqu\'à minuit parfois.',st:'I study until midnight sometimes.',tip:'Also used for places: jusqu\'à la gare.'},
]},

{id:'core_adjectives_adverbs',emoji:'⭐',name:'Adjectifs & Adverbes Clés',color:'#a93226',cards:[
{f:'bien',p:'BYEHN',e:'well / good (adverb)',s:'Il parle bien français maintenant.',st:'He speaks French well now.',tip:'Adverb — describes a verb, not a noun.'},
{f:'mal',p:'MAL',e:'badly',s:'J\'ai mal dormi hier soir.',st:'I slept badly last night.',tip:'Avoir mal à = to have pain in (a body part).'},
{f:'vite',p:'VEET',e:'quickly',s:'Elle parle trop vite pour moi.',st:'She speaks too fast for me.',tip:'Common complaint of language learners!'},
{f:'lentement',p:'lont-MON',e:'slowly',s:'Pouvez-vous parler plus lentement?',st:'Can you speak more slowly?',tip:'Very useful phrase for the TCF listening test.'},
{f:'grand(e)',p:'GRON / GROND',e:'big / tall',s:'C\'est une grande ville, Calgary.',st:'Calgary is a big city.',tip:'Placed before the noun, unlike most adjectives.'},
{f:'petit(e)',p:'puh-TEE / puh-TEET',e:'small',s:'J\'habite dans un petit appartement.',st:'I live in a small apartment.',tip:'Also placed before the noun.'},
{f:'bon(ne)',p:'BON / BUN',e:'good',s:'C\'est un bon professeur de français.',st:'He\'s a good French teacher.',tip:'Irregular feminine form: bonne.'},
{f:'mauvais(e)',p:'moh-VEH / moh-VEZ',e:'bad',s:'J\'ai une mauvaise prononciation parfois.',st:'I sometimes have bad pronunciation.',tip:'Opposite of \'bon\'.'},
{f:'nouveau / nouvelle',p:'noo-VOH / noo-VEL',e:'new',s:'J\'ai un nouveau collègue au travail.',st:'I have a new colleague at work.',tip:'Becomes \'nouvel\' before a vowel sound.'},
{f:'difficile',p:'dee-fee-SEEL',e:'difficult',s:'La négation est difficile à comprendre.',st:'Negation is difficult to understand.',tip:'Same form for masculine and feminine.'},
{f:'facile',p:'fa-SEEL',e:'easy',s:'Cette leçon est plus facile que la dernière.',st:'This lesson is easier than the last one.',tip:'Same form for masculine and feminine.'},
{f:'important(e)',p:'am-por-TON / -TONT',e:'important',s:'C\'est important de pratiquer chaque jour.',st:'It\'s important to practice every day.',tip:'Common in TCF opinion-based answers.'},
{f:'possible',p:'po-SEEBL',e:'possible',s:'Il est possible de réussir en six mois.',st:'It\'s possible to succeed in six months.',tip:'Impossible = the opposite.'},
{f:'prêt(e)',p:'PREH / PRET',e:'ready',s:'Je suis prêt pour mon examen.',st:'I\'m ready for my exam.',tip:'Être prêt(e) à/pour = to be ready to/for.'},
{f:'sûr(e)',p:'SEWR',e:'sure',s:'Je suis sûr que ça va bien se passer.',st:'I\'m sure it\'s going to go well.',tip:'Bien sûr! = Of course!'},
{f:'content(e)',p:'kon-TON / -TONT',e:'happy / pleased',s:'Je suis content de mes progrès.',st:'I\'m happy with my progress.',tip:'Content de + noun/infinitive.'},
{f:'fatigué(e)',p:'fa-tee-GAY',e:'tired',s:'Je suis fatigué après le travail.',st:'I\'m tired after work.',tip:'Common in everyday small talk.'},
{f:'occupé(e)',p:'o-kew-PAY',e:'busy',s:'Je suis très occupé cette semaine.',st:'I\'m very busy this week.',tip:'Useful for TCF speaking about your schedule.'},
{f:'gratuit(e)',p:'gra-TWEE / -TWEET',e:'free (no cost)',s:'L\'entrée est gratuite pour les étudiants.',st:'Admission is free for students.',tip:'Different word from \'libre\' (available/free time).'},
{f:'cher / chère',p:'SHEHR',e:'expensive / dear',s:'Ce cours en ligne est trop cher.',st:'This online course is too expensive.',tip:'Also means \'dear\' in a letter: Cher Monsieur.'},
]},

{id:'tcf_expressions',emoji:'🎯',name:'Expressions Clés TCF',color:'#2874a6',cards:[
{f:'je voudrais',p:'zhuh voo-DREH',e:'I would like',s:'Je voudrais poser une question, s\'il vous plaît.',st:'I would like to ask a question, please.',tip:'Polite conditional form of vouloir — great for TCF speaking.'},
{f:'j\'ai besoin de',p:'zhay buh-ZWAN duh',e:'I need',s:'J\'ai besoin de plus de temps pour réviser.',st:'I need more time to review.',tip:'Besoin de + noun or infinitive.'},
{f:'je peux',p:'zhuh PUH',e:'I can',s:'Est-ce que je peux vous poser une question?',st:'May I ask you a question?',tip:'From pouvoir — very common in polite requests.'},
{f:'est-ce que',p:'es-kuh',e:'is it that... (question marker)',s:'Est-ce que tu comprends la leçon?',st:'Do you understand the lesson?',tip:'Turns any statement into a yes/no question.'},
{f:'il y a',p:'eel-YA',e:'there is / there are',s:'Il y a beaucoup à apprendre avant l\'examen.',st:'There is a lot to learn before the exam.',tip:'Negative form: il n\'y a pas de.'},
{f:'c\'est',p:'SEH',e:'it is / this is',s:'C\'est important de pratiquer la prononciation.',st:'It\'s important to practice pronunciation.',tip:'One of the most common phrases in French.'},
{f:'ça dépend',p:'sa day-PON',e:'it depends',s:'Ça dépend de mon score au TCF.',st:'It depends on my TCF score.',tip:'Great neutral answer for opinion questions.'},
{f:'je pense que',p:'zhuh pons kuh',e:'I think that',s:'Je pense que la pratique orale est essentielle.',st:'I think that oral practice is essential.',tip:'Useful sentence starter for TCF speaking answers.'},
{f:'à mon avis',p:'a mo-nna-VEE',e:'in my opinion',s:'À mon avis, il faut pratiquer chaque jour.',st:'In my opinion, you have to practice every day.',tip:'Strong phrase for expressing opinions in Expression Orale.'},
{f:'par exemple',p:'par eg-ZONPL',e:'for example',s:'Par exemple, je révise le vocabulaire chaque soir.',st:'For example, I review vocabulary every evening.',tip:'Useful for supporting an argument with a detail.'},
{f:'en fait',p:'on FEHT',e:'in fact / actually',s:'En fait, j\'ai commencé le français il y a six mois.',st:'Actually, I started French six months ago.',tip:'Common filler to add nuance or correction.'},
{f:'tout à fait',p:'too-ta-FEH',e:'absolutely / exactly',s:'Tout à fait, je suis d\'accord avec toi.',st:'Absolutely, I agree with you.',tip:'Strong agreement phrase, more formal than \'oui\'.'},
{f:'bien sûr',p:'byehn SEWR',e:'of course',s:'Bien sûr, je peux t\'aider avec la grammaire.',st:'Of course, I can help you with grammar.',tip:'Common polite affirmative response.'},
{f:'peut-être',p:'puh-TEHTR',e:'maybe / perhaps',s:'Peut-être que je vais passer l\'examen en automne.',st:'Maybe I\'ll take the exam in the fall.',tip:'Can start a sentence, often with inversion after it.'},
{f:'d\'après moi',p:'da-preh MWAH',e:'according to me',s:'D\'après moi, cette méthode est efficace.',st:'According to me, this method is effective.',tip:'Alternative to \'à mon avis\' for TCF speaking.'},
{f:'par contre',p:'par KONTR',e:'on the other hand',s:'J\'aime la grammaire; par contre, l\'oral est difficile.',st:'I like grammar; on the other hand, speaking is hard.',tip:'Useful connector for contrast in TCF writing/speaking.'},
{f:'c\'est-à-dire',p:'seh-ta-DEER',e:'that is to say',s:'Je dois réviser, c\'est-à-dire étudier chaque soir.',st:'I need to review, that is to say study every evening.',tip:'Used to clarify or rephrase a point.'},
{f:'grâce à',p:'grahs A',e:'thanks to',s:'Grâce à mes classes, mon français s\'améliore.',st:'Thanks to my classes, my French is improving.',tip:'Positive cause — contrast with \'à cause de\' (negative cause).'},
{f:'à cause de',p:'a KOHZ duh',e:'because of',s:'À cause du travail, je révise le soir seulement.',st:'Because of work, I only review in the evening.',tip:'Usually introduces a negative or neutral cause.'},
]},

{id:'core_nouns',emoji:'📦',name:'Noms Essentiels',color:'#148f77',cards:[
{f:'le temps',p:'luh TON',e:'time / weather',s:'Je n\'ai pas le temps de finir aujourd\'hui.',st:'I don\'t have time to finish today.',tip:'Also means \'weather\': quel temps fait-il?'},
{f:'le jour',p:'luh ZHOOR',e:'the day',s:'Chaque jour, je révise mon vocabulaire.',st:'Every day, I review my vocabulary.',tip:'Un jour = one day; tous les jours = every day.'},
{f:'l\'année',p:'la-NAY',e:'the year',s:'Cette année, je passe le TCF Canada.',st:'This year, I\'m taking the TCF Canada.',tip:'Cette année vs cet an — \'année\' is used with adjectives.'},
{f:'la semaine',p:'la suh-MEN',e:'the week',s:'J\'ai trois cours par semaine.',st:'I have three classes per week.',tip:'Common in scheduling sentences.'},
{f:'le mois',p:'luh MWAH',e:'the month',s:'Le mois prochain, j\'ai un examen blanc.',st:'Next month, I have a practice exam.',tip:'Le mois dernier / prochain = last/next month.'},
{f:'l\'heure',p:'LUHR',e:'the hour / time',s:'Quelle heure est-il maintenant?',st:'What time is it now?',tip:'À l\'heure = on time.'},
{f:'le moment',p:'luh mo-MON',e:'the moment',s:'En ce moment, j\'étudie la négation.',st:'At the moment, I\'m studying negation.',tip:'Un moment, s\'il vous plaît = one moment, please.'},
{f:'la chose',p:'la SHOHZ',e:'the thing',s:'C\'est la même chose pour moi.',st:'It\'s the same thing for me.',tip:'Quelque chose = something.'},
{f:'le monde',p:'luh MOND',e:'the world / people',s:'Il y a beaucoup de monde ici aujourd\'hui.',st:'There are a lot of people here today.',tip:'Tout le monde = everyone.'},
{f:'la vie',p:'la VEE',e:'the life',s:'La vie au Canada est différente.',st:'Life in Canada is different.',tip:'C\'est la vie! = That\'s life!'},
{f:'le travail',p:'luh tra-VAI',e:'the work / job',s:'Mon travail est très exigeant.',st:'My job is very demanding.',tip:'Au travail = at work.'},
{f:'la maison',p:'la meh-ZON',e:'the house / home',s:'Je révise à la maison le soir.',st:'I review at home in the evening.',tip:'À la maison = at home.'},
{f:'la famille',p:'la fa-MEE-yuh',e:'the family',s:'Ma famille habite en Inde.',st:'My family lives in India.',tip:'En famille = with family.'},
{f:'l\'ami / l\'amie',p:'la-MEE',e:'the friend',s:'Mon ami m\'aide à pratiquer le français.',st:'My friend helps me practice French.',tip:'Petit(e) ami(e) = boyfriend/girlfriend.'},
{f:'l\'argent',p:'lar-ZHON',e:'the money',s:'Je dépense de l\'argent pour mes cours.',st:'I spend money on my classes.',tip:'Not to be confused with \'silver\', same word!'},
{f:'l\'eau',p:'LOH',e:'the water',s:'Je bois de l\'eau pendant le cours.',st:'I drink water during class.',tip:'Feminine noun, irregular plural: des eaux.'},
{f:'la nourriture',p:'la noo-ree-TEWR',e:'the food',s:'La nourriture indienne me manque un peu.',st:'I miss Indian food a little.',tip:'Manger = to eat is the related verb.'},
{f:'le problème',p:'luh pro-BLEM',e:'the problem',s:'Je n\'ai pas de problème avec la grammaire.',st:'I don\'t have a problem with grammar.',tip:'Pas de problème! = No problem!'},
{f:'la question',p:'la kes-TYON',e:'the question',s:'J\'ai une question sur les verbes -RE.',st:'I have a question about -RE verbs.',tip:'Poser une question = to ask a question.'},
{f:'la réponse',p:'la ray-PONS',e:'the answer',s:'Ta réponse est correcte!',st:'Your answer is correct!',tip:'Répondre is the related verb.'},

{f:'la raison',p:'la reh-ZON',e:'the reason',s:'Quelle est la raison de ton absence?',st:'What\'s the reason for your absence?',tip:'Avoir raison = to be right.'},

{f:'l\'endroit',p:'lon-DRWAH',e:'the place',s:'Calgary est un bel endroit pour vivre.',st:'Calgary is a beautiful place to live.',tip:'Synonym: le lieu.'},
{f:'le pays',p:'luh pay-EE',e:'the country',s:'Le Canada est un grand pays.',st:'Canada is a big country.',tip:'Note: \'pays\' looks singular and plural the same.'},
{f:'la ville',p:'la VEEL',e:'the city',s:'Calgary est une ville dynamique.',st:'Calgary is a dynamic city.',tip:'En ville = downtown/in town.'},
{f:'la rue',p:'la REW',e:'the street',s:'J\'habite dans une rue calme.',st:'I live on a quiet street.',tip:'Dans la rue = in the street.'},
{f:'la voiture',p:'la vwa-TEWR',e:'the car',s:'Je vais au travail en voiture.',st:'I go to work by car.',tip:'En voiture = by car.'},
{f:'le téléphone',p:'luh tay-lay-FON',e:'the phone',s:'Mon téléphone sonne pendant le cours!',st:'My phone rings during class!',tip:'Au téléphone = on the phone.'},
{f:'le travail scolaire',p:'luh tra-VAI sko-LEHR',e:'schoolwork / coursework',s:'Je fais mon travail scolaire chaque soir.',st:'I do my coursework every evening.',tip:'Useful phrase for describing study routines in TCF.'},
]},

{f:'écrire',p:'ay-KREER',e:'to write',s:'J\'écris mes réponses avant l\'examen oral.',st:'I write my answers before the oral exam.',tip:'Related noun: l\'écriture (writing/handwriting).'},

{f:'aider',p:'eh-DAY',e:'to help',s:'Mon professeur m\'aide beaucoup en français.',st:'My teacher helps me a lot with French.',tip:'Aider quelqu\'un à faire quelque chose.'},
{f:'continuer',p:'kon-tee-nway',e:'to continue',s:'Je continue à pratiquer chaque semaine.',st:'I continue to practice every week.',tip:'Continuer à/de + infinitive.'},

{id:'c1_connectors',emoji:'🎓',name:'C1 — Connecteurs Avancés',color:'#1a5276',cards:[
{f:'néanmoins',p:'nay-on-MWAN',e:'nevertheless',s:'Le cours est difficile ; néanmoins, je progresse chaque semaine.',st:'The class is difficult; nevertheless, I\'m progressing every week.',tip:'More formal than \'mais\' — common in TCF writing and essays.'},
{f:'cependant',p:'suh-pon-DON',e:'however',s:'Cependant, il reste beaucoup de vocabulaire à maîtriser.',st:'However, there\'s still a lot of vocabulary to master.',tip:'Interchangeable with \'toutefois\' in formal writing.'},
{f:'toutefois',p:'toot-FWAH',e:'however / nonetheless',s:'Toutefois, mon niveau à l\'oral s\'améliore rapidement.',st:'However, my speaking level is improving quickly.',tip:'Slightly more literary than \'cependant\'.'},
{f:'or',p:'OR',e:'now / yet (logical transition)',s:'Or, ce point n\'a pas encore été abordé en classe.',st:'Now, this point hasn\'t been addressed in class yet.',tip:'Introduces a new fact that changes the argument — common in C1 essays.'},
{f:'en outre',p:'on-OOTR',e:'furthermore / moreover',s:'En outre, la pratique orale reste essentielle.',st:'Furthermore, oral practice remains essential.',tip:'Adds a supporting point — used to structure formal arguments.'},
{f:'de plus',p:'duh PLEWS',e:'moreover / in addition',s:'De plus, je révise mes fiches chaque soir.',st:'Moreover, I review my flashcards every evening.',tip:'Slightly less formal than \'en outre\', still C1-appropriate.'},
{f:'par ailleurs',p:'par eye-UHR',e:'besides / moreover',s:'Par ailleurs, le TCF évalue aussi la compréhension écrite.',st:'Besides, the TCF also assesses reading comprehension.',tip:'Introduces a related but separate point.'},
{f:'en revanche',p:'on ruh-VONSH',e:'on the other hand',s:'En revanche, l\'expression écrite demande plus de rigueur.',st:'On the other hand, written expression requires more rigor.',tip:'Marks a contrast — more formal than \'par contre\'.'},
{f:'quant à',p:'kon-TA',e:'as for / regarding',s:'Quant à l\'oral, je m\'entraîne avec un partenaire.',st:'As for speaking, I practice with a partner.',tip:'Introduces a new subtopic within a discussion.'},
{f:'dans la mesure où',p:'don la muh-ZEWR OO',e:'insofar as / given that',s:'Dans la mesure où j\'ai le temps, je révise chaque jour.',st:'Insofar as I have the time, I review every day.',tip:'Common causal connector in formal essays.'},
{f:'étant donné que',p:'ay-TON do-NAY kuh',e:'given that',s:'Étant donné que l\'examen approche, je m\'organise mieux.',st:'Given that the exam is approaching, I\'m organizing myself better.',tip:'Formal way to introduce a cause or justification.'},
{f:'bien que',p:'byehn KUH',e:'although',s:'Bien que ce soit difficile, je reste motivé.',st:'Although it\'s difficult, I remain motivated.',tip:'Requires the subjunctive mood after it.'},
{f:'quoique',p:'KWA-kuh',e:'although / even though',s:'Quoique fatigué, il continue à étudier le soir.',st:'Although tired, he continues studying in the evening.',tip:'Also requires the subjunctive — near-synonym of \'bien que\'.'},
{f:'de sorte que',p:'duh SORT kuh',e:'so that / in such a way that',s:'Je révise chaque jour, de sorte que je sois prêt.',st:'I review every day, so that I am ready.',tip:'Expresses consequence or purpose; can take subjunctive.'},
{f:'afin que',p:'a-FAN kuh',e:'so that (purpose)',s:'Je pratique l\'oral afin que ma prononciation s\'améliore.',st:'I practice speaking so that my pronunciation improves.',tip:'Always followed by the subjunctive.'},
{f:'à condition que',p:'a kon-dee-SYON kuh',e:'provided that',s:'Je réussirai à condition que je m\'entraîne régulièrement.',st:'I will succeed provided that I train regularly.',tip:'Introduces a necessary condition; takes subjunctive.'},
{f:'du moins',p:'dew MWAN',e:'at least',s:'Je n\'ai pas fini, du moins pas encore.',st:'I haven\'t finished, at least not yet.',tip:'Softens or nuances a previous statement.'},
{f:'malgré tout',p:'mal-gray TOO',e:'despite everything',s:'Malgré tout, je reste confiant pour l\'examen.',st:'Despite everything, I remain confident for the exam.',tip:'Concludes a paragraph after listing difficulties.'},
{f:'il n\'en demeure pas moins que',p:'eel non duh-MUHR pa MWAN kuh',e:'the fact remains that',s:'Il n\'en demeure pas moins que la pratique reste essentielle.',st:'The fact remains that practice is essential.',tip:'High-register phrase for concluding an argument.'},
{f:'force est de constater que',p:'FORS eh duh kon-sta-TAY kuh',e:'it must be acknowledged that',s:'Force est de constater que mon niveau progresse.',st:'It must be acknowledged that my level is improving.',tip:'Very formal — typical of C1 essay conclusions.'},
]},

{id:'c1_verbs_expr',emoji:'🧩',name:'C1 — Verbes & Expressions',color:'#6e2c00',cards:[
{f:'envisager',p:'on-vee-za-ZHAY',e:'to consider / contemplate',s:'J\'envisage de passer le TCF cet automne.',st:'I\'m considering taking the TCF this fall.',tip:'Envisager de + infinitive — common in formal plans.'},
{f:'susciter',p:'sews-see-TAY',e:'to arouse / provoke (interest, debate)',s:'Ce sujet suscite beaucoup de débats.',st:'This topic sparks a lot of debate.',tip:'Used with abstract nouns: susciter l\'intérêt, la curiosité.'},
{f:'engendrer',p:'on-zhon-DRAY',e:'to generate / bring about',s:'Le manque de pratique engendre des erreurs.',st:'Lack of practice generates mistakes.',tip:'Formal synonym of \'causer\' or \'provoquer\'.'},
{f:'remettre en question',p:'ruh-MET-tr on kes-TYON',e:'to call into question',s:'Il faut parfois remettre en question sa méthode d\'étude.',st:'One must sometimes call one\'s study method into question.',tip:'Common in argumentative essays and discussions.'},
{f:'tenir compte de',p:'tuh-NEER KONT duh',e:'to take into account',s:'Il faut tenir compte du contexte culturel.',st:'One must take the cultural context into account.',tip:'Very frequent in formal French writing.'},
{f:'se rendre compte de',p:'suh RONDR KONT duh',e:'to realize',s:'Je me suis rendu compte de mes erreurs de grammaire.',st:'I realized my grammar mistakes.',tip:'Reflexive verb — different from \'réaliser\'.'},
{f:'il s\'avère que',p:'eel sa-VEHR kuh',e:'it turns out that',s:'Il s\'avère que cette méthode est plus efficace.',st:'It turns out that this method is more effective.',tip:'Used to introduce a discovered fact.'},
{f:'contribuer à',p:'kon-tree-bway A',e:'to contribute to',s:'La pratique orale contribue à ma confiance.',st:'Oral practice contributes to my confidence.',tip:'Contribuer à + noun or infinitive.'},
{f:'favoriser',p:'fa-vo-ree-ZAY',e:'to favor / promote',s:'Ce programme favorise l\'intégration des immigrants.',st:'This program favors the integration of immigrants.',tip:'Common in policy or social topics for TCF essays.'},
{f:'entraîner',p:'on-treh-NAY',e:'to lead to / cause',s:'Un manque de sommeil entraîne une baisse de concentration.',st:'Lack of sleep leads to a drop in concentration.',tip:'Also means \'to train\' (sports) — context clarifies meaning.'},
{f:'souligner',p:'soo-lee-NYAY',e:'to emphasize / underline',s:'Je tiens à souligner l\'importance de la régularité.',st:'I want to emphasize the importance of regularity.',tip:'Used to highlight a key point in an argument.'},
{f:'nuancer',p:'new-on-SAY',e:'to qualify / add nuance to',s:'Il faut nuancer cette affirmation générale.',st:'This general statement needs to be qualified.',tip:'Shows critical thinking — valued in TCF written production.'},
{f:'approfondir',p:'a-pro-fon-DEER',e:'to deepen / go into more depth',s:'Je vais approfondir ce sujet la semaine prochaine.',st:'I\'m going to go deeper into this topic next week.',tip:'Approfondir ses connaissances = to deepen one\'s knowledge.'},
{f:'élaborer',p:'ay-la-bo-RAY',e:'to develop / elaborate',s:'Nous devons élaborer un plan d\'étude plus précis.',st:'We need to develop a more precise study plan.',tip:'Also used as \'élaborer sur\' informally, though purists avoid it.'},

{f:'remédier à',p:'ruh-may-DYAY A',e:'to remedy / address (a problem)',s:'Il faut remédier à ce problème rapidement.',st:'This problem must be addressed quickly.',tip:'Used with concrete or abstract problems.'},
{f:'pallier',p:'pa-LYAY',e:'to compensate for / offset',s:'Elle pallie son manque de vocabulaire par la lecture.',st:'She compensates for her lack of vocabulary through reading.',tip:'Note: no preposition — pallier quelque chose, not \'pallier à\'.'},
{f:'s\'appuyer sur',p:'sa-pwee-YAY sewr',e:'to rely on / be based on',s:'Mon argument s\'appuie sur des faits concrets.',st:'My argument is based on concrete facts.',tip:'Common in essay structure to justify a claim.'},
{f:'mettre en évidence',p:'MET-tr on nay-vee-DONS',e:'to highlight / bring to light',s:'Cette étude met en évidence un vrai progrès.',st:'This study highlights real progress.',tip:'Formal alternative to \'montrer\' or \'souligner\'.'},

{id:'c1_abstract_nouns',emoji:'💭',name:'C1 — Vocabulaire Abstrait',color:'#4a235a',cards:[

{f:'un phénomène',p:'uhn fay-no-MEN',e:'a phenomenon',s:'Le bilinguisme est un phénomène courant au Canada.',st:'Bilingualism is a common phenomenon in Canada.',tip:'Used for social, natural, or linguistic patterns.'},
{f:'une controverse',p:'ewn kon-tro-VEHRS',e:'a controversy',s:'Ce sujet suscite une controverse importante.',st:'This topic sparks significant controversy.',tip:'Controversé(e) = controversial (adjective form).'},

{f:'une divergence',p:'ewn dee-vehr-ZHONS',e:'a divergence',s:'Il existe une divergence d\'opinions sur ce point.',st:'There\'s a divergence of opinions on this point.',tip:'Diverger = to diverge (verb).'},

const synth = window.speechSynthesis;
let frVoice = null, slowMode = false;

function loadVoices(){
  const all = synth ? synth.getVoices() : [];
  frVoice = all.find(v=>v.lang==='fr-FR') || all.find(v=>v.lang.startsWith('fr')) || null;
  document.getElementById('audioStatus').textContent =
    !synth ? '🔇 No audio' :
    frVoice ? '🔊 French audio' : '🔊 Generic audio';
}
if(synth){ synth.onvoiceschanged=loadVoices; loadVoices(); setTimeout(loadVoices,600); }

function speak(text, btnId){
  if(!synth) return;
  synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'fr-FR';
  if(frVoice) u.voice = frVoice;
  u.rate = slowMode ? 0.55 : 0.82;
  u.pitch = 1.0; u.volume = 1.0;
  if(btnId){ const b=document.getElementById(btnId); if(b) b.classList.add('playing'); }
  u.onend = () => { if(btnId){ const b=document.getElementById(btnId); if(b) b.classList.remove('playing'); } };
  synth.speak(u);
}
function toggleSlow(){
  slowMode = !slowMode;
  document.getElementById('slowBtn').textContent = slowMode ? '🐇 Normal' : '🐢 Slow';
}
function doSpeakCurrent(){
  if(deck.length) speak(deck[idx].c.f);
}

let cat=0, deck=[], idx=0, flipped=false, known=new Set(), flips=0;

function initDeck(){
  deck = D[cat].cards.filter((_,i)=>!known.has(cat+':'+i)).map((c,i)=>({c,i}));
  idx=0; flipped=false;
  document.getElementById('cardWrap').classList.remove('flipped');
  render();
}
function doShuffle(){
  for(let i=deck.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [deck[i],deck[j]]=[deck[j],deck[i]];
  }
  idx=0; flipped=false;
  document.getElementById('cardWrap').classList.remove('flipped');
  render();
}
function doReset(){ known.clear(); initDeck(); }
function doMarkKnown(){
  if(!deck.length) return;
  known.add(cat+':'+deck[idx].i);
  deck.splice(idx,1);
  if(idx>=deck.length) idx=Math.max(0,deck.length-1);
  flipped=false;
  document.getElementById('cardWrap').classList.remove('flipped');
  if(navigator.vibrate) navigator.vibrate(30);
  render();
}
function doFlip(){
  flipped=!flipped;
  document.getElementById('cardWrap').classList.toggle('flipped',flipped);
  flips++; document.getElementById('sFlip').textContent=flips;
  if(flipped && deck.length){
    // Speak word when revealing answer
    setTimeout(()=>speak(deck[idx].c.f),250);
  }
  if(navigator.vibrate) navigator.vibrate(15);
}
function prev(){
  if(idx>0){ idx--; flipped=false; document.getElementById('cardWrap').classList.remove('flipped'); render(); }
}
function next(){
  if(idx<deck.length-1){ idx++; flipped=false; document.getElementById('cardWrap').classList.remove('flipped'); render(); }
}

function esc(s){ return s.replace(/'/g,"\\'"); }

// ══════════════════════════════════════════════════════════
//  PRONUNCIATION RECORD & CHECK
// ══════════════════════════════════════════════════════════
let mediaRecorder=null, audioChunks=[], recordedURL=null, isRecording=false;
let recognizer=null, recognizedText='', recognitionSupported=false;

(function(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(SR){
    recognitionSupported = true;
    recognizer = new SR();
    recognizer.lang = 'fr-FR';
    recognizer.interimResults = false;
    recognizer.maxAlternatives = 1;
  }
})();

function normalizeFr(str){
  return (str||'').toLowerCase()
    .replace(/[.,!?;:"'«»()]/g,' ')
    .replace(/\s+/g,' ')
    .trim();
}

function levenshtein(a,b){
  const m=a.length, n=b.length;
  const dp=Array.from({length:m+1},()=>new Array(n+1).fill(0));
  for(let i=0;i<=m;i++) dp[i][0]=i;
  for(let j=0;j<=n;j++) dp[0][j]=j;
  for(let i=1;i<=m;i++){
    for(let j=1;j<=n;j++){
      if(a[i-1]===b[j-1]) dp[i][j]=dp[i-1][j-1];
      else dp[i][j]=1+Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    }
  }
  return dp[m][n];
}

function wordMatchDiff(targetWords, spokenWords){
  // greedy alignment: for each target word, find best-matching unused spoken word
  const used = new Array(spokenWords.length).fill(false);
  const results = [];
  for(const tw of targetWords){
    let bestIdx=-1, bestScore=-1;
    for(let i=0;i<spokenWords.length;i++){
      if(used[i]) continue;
      const sw=spokenWords[i];
      const dist=levenshtein(tw,sw);
      const maxLen=Math.max(tw.length,sw.length,1);
      const score=1-(dist/maxLen);
      if(score>bestScore){ bestScore=score; bestIdx=i; }
    }
    const isMatch = bestIdx>=0 && bestScore>=0.6;
    if(isMatch) used[bestIdx]=true;
    results.push({word:tw, match:isMatch});
  }
  return results;
}

function scoreColor(pct){
  if(pct>=85) return {c:'#27ae60', label:'Excellent! 🎉'};
  if(pct>=65) return {c:'#e6a817', label:'Good — keep practicing 👍'};
  return {c:'#e74c3c', label:'Try again — listen to the sample first 🎧'};
}

function renderPronResult(html){
  document.getElementById('pronResult').innerHTML = html;
}

async function togglePronCheck(targetText){
  const btn = document.getElementById('micBtn');
  if(isRecording){
    stopPronRecording();
    return;
  }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    renderPronResult(`<div class="pron-result" style="color:#b0392b">Microphone access isn't supported in this browser. Try Chrome or Safari on iOS 14.5+.</div>`);
    return;
  }
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    audioChunks = [];
    let mimeType = '';
    for(const t of ['audio/mp4','audio/webm','audio/ogg']){
      if(window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(t)){ mimeType=t; break; }
    }
    mediaRecorder = mimeType ? new MediaRecorder(stream,{mimeType}) : new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e=>{ if(e.data.size>0) audioChunks.push(e.data); };
    mediaRecorder.onstop = ()=>{
      stream.getTracks().forEach(tr=>tr.stop());
      const blob = new Blob(audioChunks, {type: mimeType||'audio/webm'});
      if(recordedURL) URL.revokeObjectURL(recordedURL);
      recordedURL = URL.createObjectURL(blob);
      finishPronCheck(targetText);
    };

    recognizedText='';
    if(recognitionSupported){
      try{
        recognizer.onresult = (e)=>{
          recognizedText = e.results[0][0].transcript;
        };
        recognizer.onerror = ()=>{};
        recognizer.start();
      }catch(err){ /* recognizer may already be running; ignore */ }
    }

    mediaRecorder.start();
    isRecording = true;
    btn.classList.add('recording');
    btn.innerHTML = '⏹ Stop (listening…)';
    renderPronResult(`<div class="pron-result scoring">🎙️ Recording — say the word or sentence now…</div>`);
  }catch(err){
    renderPronResult(`<div class="pron-result" style="color:#b0392b">Microphone permission was denied or unavailable. Please allow microphone access to use this feature.</div>`);
  }
}

function stopPronRecording(){
  const btn = document.getElementById('micBtn');
  isRecording = false;
  btn.classList.remove('recording');
  btn.innerHTML = '🎙️ Record &amp; Check';
  if(mediaRecorder && mediaRecorder.state!=='inactive') mediaRecorder.stop();
  if(recognitionSupported){ try{ recognizer.stop(); }catch(err){} }
  renderPronResult(`<div class="pron-result scoring">⏳ Analyzing your pronunciation…</div>`);
}

function finishPronCheck(targetText){
  const playbackBtn = `<button class="pron-playback" onclick="event.stopPropagation();new Audio('${recordedURL}').play()">▶️ Play my recording</button>`;

  if(!recognitionSupported){
    renderPronResult(`
      <div class="pron-result">
        <b>Recording saved.</b> Automatic accuracy scoring needs a browser with speech recognition support
        (Chrome on desktop or Android). On iPhone Safari, play back your recording below and compare it
        by ear to the 🔊 sample audio above.
        ${playbackBtn}
      </div>
    `);
    return;
  }

  // give recognition a brief moment to finalize onresult callback
  setTimeout(()=>{
    const target = normalizeFr(targetText);
    const spoken = normalizeFr(recognizedText);
    if(!spoken){
      renderPronResult(`
        <div class="pron-result">
          <b>No speech detected.</b> Make sure microphone access is allowed and try speaking clearly right after tapping record.
          ${playbackBtn}
        </div>
      `);
      return;
    }
    const targetWords = target.split(' ').filter(Boolean);
    const spokenWords = spoken.split(' ').filter(Boolean);
    const diff = wordMatchDiff(targetWords, spokenWords);
    const matched = diff.filter(d=>d.match).length;
    const pct = Math.round((matched/Math.max(targetWords.length,1))*100);
    const sc = scoreColor(pct);
    const wordsHtml = diff.map(d=>`<span class="pron-word ${d.match?'match':'miss'}">${d.word}</span>`).join('');

    renderPronResult(`
      <div class="pron-result">
        <div class="pron-score-row">
          <div class="pron-score-num" style="color:${sc.c}">${pct}%</div>
          <div class="pron-score-bar"><div class="pron-score-fill" style="width:${pct}%;background:${sc.c}"></div></div>
        </div>
        <div style="font-weight:700;color:${sc.c}">${sc.label}</div>
        <div class="pron-words">${wordsHtml}</div>
        <div class="pron-heard">You said: "${recognizedText}"</div>
        ${playbackBtn}
      </div>
    `);
  }, 400);
}



function render(){
  if(isRecording){
    isRecording=false;
    if(mediaRecorder && mediaRecorder.state!=='inactive') mediaRecorder.stop();
    if(recognitionSupported){ try{ recognizer.stop(); }catch(err){} }
  }
  const total = D[cat].cards.length;
  const pct = Math.round(known.size/total*100);
  document.getElementById('pb').style.width = pct+'%';
  document.getElementById('pt').textContent = known.size+' / '+total+' known';
  document.getElementById('sKnown').textContent = known.size;
  document.getElementById('sLeft').textContent = deck.length;
  document.getElementById('sCard').textContent = deck.length ? (idx+1)+'/'+deck.length : '—';
  document.getElementById('cntLbl').textContent = deck.length ? 'Card '+(idx+1)+' of '+deck.length : '';

  // nav states
  ['dnPrev','bnPrev'].forEach(id=>{ const b=document.getElementById(id); if(b) b.disabled=(idx===0); });
  ['dnNext','bnNext'].forEach(id=>{ const b=document.getElementById(id); if(b) b.disabled=(idx>=deck.length-1); });
  // swipe progress
  const pLine = document.getElementById('swipeLine');
  if(deck.length>1) pLine.style.width=(idx/(deck.length-1)*100)+'%';
  else pLine.style.width='100%';

  const cf=document.getElementById('cf'), cb=document.getElementById('cb');
  if(!deck.length){
    document.getElementById('cntLbl').textContent='🎉 Category complete!';
    cf.innerHTML=`<div class="done-face"><div style="font-size:3rem">🏆</div><div style="color:var(--gold);font-size:1.2rem;font-weight:800">All cards known!</div><div style="opacity:.7;font-size:.88rem;margin-top:4px">Tap Reset to practice again</div></div>`;
    cb.innerHTML=`<div class="done-face"><div style="font-size:2.5rem;color:var(--green)">🌟</div><div style="font-size:1.1rem;font-weight:700;color:var(--navy)">Excellent work!</div></div>`;
    return;
  }

  const card = deck[idx].c;
  const col  = D[cat].color;
  const isNum= D[cat].id==='numbers';

  // ── FRONT ──
  cf.innerHTML = `
    <div class="cat-badge" style="color:${col}">${D[cat].emoji} ${D[cat].name}</div>
    <div class="word-fr">${card.f}</div>
    <div class="front-pron">/ ${card.p} /</div>
    <div class="front-audio-row">
      <button class="aud-btn" id="spkW" onclick="event.stopPropagation();speak('${esc(card.f)}','spkW')">🔊 Word</button>
      <button class="aud-btn" id="spkE" onclick="event.stopPropagation();speak('${esc(card.s||card.f)}','spkE')">📖 Example</button>
    </div>
    <div class="tap-hint">Tap card to flip · Swipe to navigate</div>
  `;

  // ── BACK ──
  const tc = isNum ? 'tip-box trick' : 'tip-box';
  const ti = isNum ? '🎯' : '💡';
  cb.innerHTML = `
    <div class="back-word">${card.f}</div>
    <div class="back-pron">/ ${card.p} /</div>
    <div class="back-eng">${card.e}</div>
    <div class="divider"></div>
    <div class="example-box">
      <div class="ex-fr">📖 ${card.s||'—'}</div>
      <div class="ex-en">➡ ${card.st||'—'}</div>
    </div>
    <div class="back-aud-row">
      <button class="bk-aud" onclick="event.stopPropagation();speak('${esc(card.f)}')">🔊 Word</button>
      <button class="bk-aud" onclick="event.stopPropagation();speak('${esc(card.s||'')}')">🔊 Sentence</button>
      <button class="bk-aud slow" onclick="event.stopPropagation();toggleSlow();speak('${esc(card.f)}')">🐢 Slow</button>
    </div>
    <div class="pron-check-row">
      <button class="mic-btn" id="micBtn" onclick="event.stopPropagation();togglePronCheck('${esc(card.f)}')">🎙️ Record &amp; Check</button>
    </div>
    <div id="pronResult"></div>
    ${card.tip ? `<div class="${tc}">${ti} ${card.tip}</div>` : ''}
  `;
}

// ══════════════════════════════════════════════════════════
//  TOUCH  (swipe + tap)
// ══════════════════════════════════════════════════════════
(function(){
  const wrap = document.getElementById('cardWrap');
  let sx=0, sy=0, st=0, moved=false;

  wrap.addEventListener('touchstart', e=>{
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    st = Date.now();
    moved = false;
  }, {passive:true});

  wrap.addEventListener('touchmove', e=>{
    const dx = Math.abs(e.touches[0].clientX - sx);
    const dy = Math.abs(e.touches[0].clientY - sy);
    if(dx > 12 || dy > 12) moved = true;
  }, {passive:true});

  wrap.addEventListener('touchend', e=>{
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    const dt = Date.now() - st;
    const absDx = Math.abs(dx), absDy = Math.abs(dy);

    if(moved && absDx > 55 && absDx > absDy * 1.4 && dt < 600){
      // Horizontal swipe → navigate
      if(dx < 0) next(); else prev();
      if(navigator.vibrate) navigator.vibrate(20);
    } else if(!moved && dt < 350 && absDx < 15 && absDy < 15){
      // Clean tap → flip
      doFlip();
    }
    moved = false;
  }, {passive:true});
})();

// ══════════════════════════════════════════════════════════
//  KEYBOARD  (desktop)
// ══════════════════════════════════════════════════════════
document.addEventListener('keydown', e=>{
  if(['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
  if(e.code==='Space'){e.preventDefault();doFlip();}
  else if(e.code==='ArrowRight') next();
  else if(e.code==='ArrowLeft')  prev();
  else if(e.code==='KeyK') doMarkKnown();
  else if(e.code==='KeyS' && deck.length) speak(deck[idx].c.f);
});

// ══════════════════════════════════════════════════════════
//  BUILD TABS
// ══════════════════════════════════════════════════════════
function buildTabs(){
  const el = document.getElementById('tabs');
  D.forEach((cat_,i)=>{
    const b = document.createElement('button');
    b.className = 'tab' + (i===0?' active':'');
    b.innerHTML = `${cat_.emoji} ${cat_.name}<span class="cnt">${cat_.cards.length}</span>`;
    b.onclick = ()=>{
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      b.classList.add('active');
      cat=i; known.clear();
      document.getElementById('catLbl').textContent = cat_.emoji+' '+cat_.name;
      initDeck();
      // Scroll active tab into view
      b.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
    };
    el.appendChild(b);
  });
  document.getElementById('catLbl').textContent = D[0].emoji+' '+D[0].name;
}

buildTabs();
initDeck();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
