<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FR Cards">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2F3C7E">
<title>🇫🇷 French Flashcards</title>
<style>
/* ═══════════════════════════════════════
   TOKENS & RESET
═══════════════════════════════════════ */
:root{
  --navy:#2F3C7E; --coral:#F96167; --gold:#F9E795;
  --cream:#FBF8F1; --dark:#26263A; --green:#27ae60;
  --card-h: clamp(310px, 52vh, 460px);
  --bottom-nav-h: 68px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow-x:hidden;font-family:'Segoe UI',system-ui,sans-serif;background:var(--cream);color:var(--dark);overscroll-behavior-y:contain;}
button{touch-action:manipulation;cursor:pointer;font-family:inherit;}
img{-webkit-user-drag:none;user-drag:none;}

/* ═══════════════════════════════════════
   TOP HEADER
═══════════════════════════════════════ */
.hdr{
  background:var(--navy);color:#fff;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px 10px;
  padding-top: max(10px, env(safe-area-inset-top));
  gap:10px;flex-shrink:0;
}
.hdr-left h1{font-size:clamp(.95rem,3.5vw,1.2rem);font-weight:800;line-height:1.2;}
.hdr-left p{font-size:.68rem;opacity:.7;margin-top:1px;}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.prog-wrap{width:clamp(100px,25vw,150px);background:rgba(255,255,255,.2);border-radius:10px;height:5px;}
.prog-bar{background:var(--gold);border-radius:10px;height:5px;transition:width .3s;width:0;}
.prog-txt{font-size:.65rem;color:var(--gold);}
.audio-badge{font-size:.62rem;background:rgba(255,255,255,.15);border-radius:10px;padding:2px 7px;color:rgba(255,255,255,.8);}

/* ═══════════════════════════════════════
   CATEGORY TABS  — horizontal scroll
═══════════════════════════════════════ */
.tabs{
  display:flex;gap:6px;
  padding:9px 12px;
  overflow-x:auto;overflow-y:hidden;
  background:#fff;
  border-bottom:2px solid #eee;
  flex-shrink:0;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none;}
.tab{
  display:flex;align-items:center;gap:4px;
  padding:7px 12px;
  border-radius:20px;border:2px solid #ddd;
  background:#fff;
  font-size:.78rem;font-weight:700;color:#666;
  white-space:nowrap;min-height:38px;
  transition:all .15s;flex-shrink:0;
}
.tab .cnt{
  background:rgba(0,0,0,.08);border-radius:8px;
  padding:1px 5px;font-size:.68rem;
}
.tab.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.tab.active .cnt{background:rgba(255,255,255,.25);}

/* ═══════════════════════════════════════
   CONTROLS ROW
═══════════════════════════════════════ */
.ctrl{
  display:flex;align-items:center;gap:6px;
  padding:7px 12px;
  background:var(--cream);border-bottom:1px solid #e5e3dc;
  flex-shrink:0;flex-wrap:wrap;
}
.btn{
  padding:7px 13px;border-radius:18px;border:none;
  font-size:.78rem;font-weight:700;min-height:36px;
  transition:background .15s;
}
.btn-coral{background:var(--coral);color:#fff;}
.btn-coral:active{background:#d94f55;}
.btn-navy{background:#fff;color:var(--navy);border:2px solid var(--navy);}
.btn-navy:active{background:var(--navy);color:#fff;}
.btn-grey{background:#fff;color:#555;border:2px solid #ddd;}
.btn-grey:active{background:#eee;}
.cat-lbl{margin-left:auto;font-size:.82rem;font-weight:800;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;}

/* ═══════════════════════════════════════
   STATS
═══════════════════════════════════════ */
.stats{
  display:flex;gap:6px;padding:4px 12px 6px;flex-shrink:0;overflow-x:auto;
  scrollbar-width:none;
}
.stats::-webkit-scrollbar{display:none;}
.stat{
  background:#fff;border-radius:8px;padding:3px 10px;
  font-size:.72rem;color:#666;border:1px solid #eee;
  white-space:nowrap;flex-shrink:0;
}
.stat strong{color:var(--navy);}

/* ═══════════════════════════════════════
   CARD AREA
═══════════════════════════════════════ */
.area{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:10px 12px 4px;
  min-height:0;overflow:hidden;
}
.ctr-lbl{font-size:.8rem;color:#999;margin-bottom:8px;flex-shrink:0;}

/* ═══════════════════════════════════════
   CARD  (3-D flip)
═══════════════════════════════════════ */
.wrap{
  perspective:1100px;
  width:100%;max-width:620px;
  height:var(--card-h);
  cursor:pointer;flex-shrink:0;
  user-select:none;-webkit-user-select:none;
  touch-action:pan-y;
  position:relative;
}
.inner{
  width:100%;height:100%;position:relative;
  transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.4,2,.5,1);
}
.wrap.flipped .inner{transform:rotateY(180deg);}
.face{
  position:absolute;inset:0;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:20px;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;
  padding:18px 20px;
  box-shadow:0 8px 28px rgba(0,0,0,.14);
  overflow:hidden;
}
.front{background:var(--navy);color:#fff;}
.back{background:#fff;transform:rotateY(180deg);justify-content:flex-start;padding-top:16px;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* swipe progress line */
.swipe-line{
  position:absolute;bottom:0;left:0;height:3px;
  background:var(--gold);border-radius:0 2px 2px 0;
  transition:width .25s;pointer-events:none;
}

/* ── FRONT content ── */
.cat-badge{
  font-size:.68rem;font-weight:800;letter-spacing:1.5px;
  text-transform:uppercase;opacity:.65;margin-bottom:8px;
}
.word-fr{
  font-size:clamp(1.6rem,7.5vw,2.7rem);
  font-weight:900;text-align:center;
  color:var(--gold);line-height:1.15;
  margin-bottom:6px;word-break:break-word;
}
.front-pron{
  font-size:clamp(.78rem,3vw,.95rem);
  color:rgba(255,255,255,.5);font-style:italic;
  margin-bottom:14px;text-align:center;
}
.front-audio-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;justify-content:center;}
.aud-btn{
  background:rgba(255,255,255,.15);
  border:1.5px solid rgba(255,255,255,.3);
  color:#fff;border-radius:18px;
  padding:7px 14px;font-size:.8rem;font-weight:600;
  min-height:40px;min-width:100px;
  transition:background .15s;
}
.aud-btn:active,.aud-btn.playing{background:var(--coral);border-color:var(--coral);}
.tap-hint{font-size:.7rem;opacity:.35;text-align:center;}
/* swipe arrows */
.sw-hint{
  display:flex;align-items:center;gap:6px;
  font-size:.68rem;opacity:.4;margin-top:8px;
}
.sw-arr{font-size:.85rem;}

/* ── BACK content ── */
.back-word{
  font-size:clamp(1.2rem,5vw,1.7rem);
  font-weight:800;color:var(--navy);
  text-align:center;margin-bottom:3px;
}
.back-pron{
  font-size:clamp(.78rem,3vw,.9rem);
  color:var(--coral);font-style:italic;
  font-weight:600;margin-bottom:4px;text-align:center;
}
.back-eng{
  font-size:clamp(.9rem,3.5vw,1.2rem);
  color:var(--dark);font-weight:700;
  text-align:center;margin-bottom:8px;
}
.divider{width:80%;height:1px;background:#eee;margin:6px auto;}
.example-box{
  background:#f7f4ee;
  border-left:3px solid var(--navy);
  border-radius:0 8px 8px 0;
  padding:8px 10px;width:100%;margin-bottom:8px;
}
.ex-fr{
  font-size:clamp(.76rem,2.8vw,.88rem);
  color:var(--navy);font-weight:700;line-height:1.4;
  display:-webkit-box;-webkit-box-orient:vertical;
  -webkit-line-clamp:3;overflow:hidden;
}
.ex-en{
  font-size:clamp(.7rem,2.6vw,.8rem);
  color:#666;margin-top:3px;line-height:1.4;
  display:-webkit-box;-webkit-box-orient:vertical;
  -webkit-line-clamp:2;overflow:hidden;
}
.back-aud-row{
  display:flex;gap:6px;flex-wrap:wrap;
  justify-content:center;margin-bottom:8px;
}
.bk-aud{
  background:var(--navy);color:#fff;border:none;
  border-radius:14px;padding:6px 12px;
  font-size:.74rem;font-weight:700;min-height:36px;
  transition:background .15s;
}
.bk-aud:active,.bk-aud.playing{background:var(--coral);}
.bk-aud.slow{background:#888;}
.pron-check-row{margin-bottom:8px;}
.mic-btn{
  background:var(--green);color:#fff;border:none;
  border-radius:16px;padding:8px 18px;
  font-size:.8rem;font-weight:800;min-height:40px;
  transition:background .15s,transform .1s;
  display:inline-flex;align-items:center;gap:6px;
}
.mic-btn:active{transform:scale(.97);}
.mic-btn.recording{background:var(--coral);animation:micPulse 1.1s infinite;}
@keyframes micPulse{
  0%{box-shadow:0 0 0 0 rgba(249,97,103,.55);}
  70%{box-shadow:0 0 0 12px rgba(249,97,103,0);}
  100%{box-shadow:0 0 0 0 rgba(249,97,103,0);}
}
.pron-result{
  width:100%;border-radius:10px;padding:9px 11px;margin-top:6px;
  font-size:clamp(.7rem,2.6vw,.8rem);line-height:1.5;text-align:left;
  background:#fff;border:1.5px solid #e0e0e0;
}
.pron-result.scoring{color:#777;text-align:center;font-style:italic;}
.pron-score-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.pron-score-num{font-size:1.3rem;font-weight:900;}
.pron-score-bar{flex:1;height:9px;border-radius:5px;background:#eee;overflow:hidden;}
.pron-score-fill{height:100%;border-radius:5px;transition:width .4s;}
.pron-words{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.pron-word{padding:1px 6px;border-radius:5px;font-size:.75rem;font-weight:700;}
.pron-word.match{background:#d4f4dd;color:#1b7a3d;}
.pron-word.miss{background:#fde0e0;color:#b0392b;}
.pron-heard{font-size:.72rem;color:#888;margin-top:6px;font-style:italic;}
.pron-playback{
  background:var(--navy);color:#fff;border:none;border-radius:12px;
  padding:5px 11px;font-size:.72rem;font-weight:700;margin-top:6px;
}
.tip-box{
  width:100%;border-radius:8px;padding:7px 10px;
  font-size:clamp(.7rem,2.6vw,.78rem);
  text-align:left;line-height:1.45;
  background:linear-gradient(135deg,#fff3e0,#ffe0b2);color:#5d3a1a;
}
.tip-box.trick{background:linear-gradient(135deg,#e8f5e9,#c8e6c9);color:#1b5e20;}

/* ═══════════════════════════════════════
   BOTTOM NAVIGATION  (fixed, thumb zone)
═══════════════════════════════════════ */
.bnav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--navy);
  display:flex;align-items:center;justify-content:space-around;
  padding:10px 12px;
  padding-bottom:calc(10px + var(--safe-bottom));
  box-shadow:0 -2px 16px rgba(0,0,0,.2);
  z-index:100;
}
.bnav-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  background:none;border:none;color:rgba(255,255,255,.55);
  font-size:.62rem;font-weight:700;letter-spacing:.5px;
  min-width:56px;min-height:52px;padding:6px 4px;
  border-radius:12px;transition:all .15s;
}
.bnav-btn .ico{font-size:1.35rem;line-height:1;}
.bnav-btn:active,.bnav-btn.active-btn{background:rgba(255,255,255,.15);color:#fff;}
.bnav-btn:disabled{opacity:.25;pointer-events:none;}
.bnav-sep{width:1px;height:32px;background:rgba(255,255,255,.15);}
/* flip centre button */
.bnav-flip{
  background:var(--coral);color:#fff;
  border-radius:50%;width:56px;height:56px;
  font-size:1.5rem;border:none;
  box-shadow:0 3px 14px rgba(249,97,103,.5);
  display:flex;align-items:center;justify-content:center;
  transition:transform .1s;
}
.bnav-flip:active{transform:scale(.92);}

/* Body padding so content isn't under fixed nav */
body{padding-bottom:calc(var(--bottom-nav-h) + var(--safe-bottom) + 4px);}

/* ═══════════════════════════════════════
   DESKTOP  overrides
═══════════════════════════════════════ */
@media(min-width:680px){
  .bnav{display:none;}
  body{padding-bottom:0;}
  .area{padding:14px 20px 16px;}
  .desktop-nav{display:flex;gap:12px;margin-top:14px;}
  .desktop-nav .dn-btn{
    width:50px;height:50px;border-radius:50%;
    border:2px solid var(--navy);background:#fff;
    font-size:1.2rem;color:var(--navy);
    display:flex;align-items:center;justify-content:center;
    transition:all .15s;cursor:pointer;
  }
  .desktop-nav .dn-btn:hover{background:var(--navy);color:#fff;}
  .desktop-nav .dn-btn:disabled{opacity:.3;pointer-events:none;}
  .kbd-hint{display:block;}
}
@media(max-width:679px){
  .desktop-nav{display:none;}
  .kbd-hint{display:none;}
}

.desktop-nav{display:none;}
.kbd-hint{display:none;font-size:.68rem;color:#aaa;margin-top:8px;text-align:center;}
kbd{background:#eee;border:1px solid #ccc;border-radius:3px;padding:1px 5px;font-size:.66rem;}

/* page layout: use flex column */
.page{display:flex;flex-direction:column;height:100%;}
.spacer{flex:1;}

/* completion screen */
.done-face{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:10px;height:100%;
}
</style>
</head>
<body>
<div class="page">
  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-left">
      <h1>🇫🇷 French Flashcards</h1>
      <p>590+ cards · Audio · Examples · Tips</p>
    </div>
    <div class="hdr-right">
      <div class="audio-badge" id="audioStatus">🔊 checking…</div>
      <div class="prog-wrap"><div class="prog-bar" id="pb"></div></div>
      <div class="prog-txt" id="pt">0 known</div>
    </div>
  </div>

  <!-- CATEGORY TABS -->
  <div class="tabs" id="tabs"></div>

  <!-- CONTROLS -->
  <div class="ctrl">
    <button class="btn btn-coral" onclick="doShuffle()">🔀 Shuffle</button>
    <button class="btn btn-navy" onclick="doReset()">↩ Reset</button>
    <button class="btn btn-grey" id="slowBtn" onclick="toggleSlow()">🐢 Slow</button>
    <span class="cat-lbl" id="catLbl"></span>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat"><strong id="sCard">1/1</strong> card</div>
    <div class="stat">Left: <strong id="sLeft">-</strong></div>
    <div class="stat">Known: <strong id="sKnown">0</strong></div>
    <div class="stat">Flipped: <strong id="sFlip">0</strong></div>
  </div>

  <!-- CARD AREA -->
  <div class="area">
    <div class="ctr-lbl" id="cntLbl">Card 1 of 1</div>

    <div class="wrap" id="cardWrap">
      <div class="inner" id="inner">
        <div class="face front" id="cf"></div>
        <div class="face back"  id="cb"></div>
      </div>
      <div class="swipe-line" id="swipeLine" style="width:0"></div>
    </div>

    <!-- desktop nav only -->
    <div class="desktop-nav">
      <button class="dn-btn" id="dnPrev" onclick="prev()">◀</button>
      <button class="dn-btn" id="dnNext" onclick="next()">▶</button>
    </div>
    <div class="kbd-hint">
      <kbd>Space</kbd> flip &nbsp;
      <kbd>→</kbd> next &nbsp;
      <kbd>←</kbd> prev &nbsp;
      <kbd>K</kbd> known &nbsp;
      <kbd>S</kbd> speak
    </div>
  </div>
</div>

<!-- FIXED BOTTOM NAV (mobile) -->
<div class="bnav">
  <button class="bnav-btn" id="bnPrev" onclick="prev()">
    <span class="ico">◀</span>Prev
  </button>
  <div class="bnav-sep"></div>
  <button class="bnav-btn" onclick="doSpeakCurrent()">
    <span class="ico">🔊</span>Hear
  </button>
  <button class="bnav-flip" id="bnFlip" onclick="doFlip()">↻</button>
  <button class="bnav-btn" onclick="doMarkKnown()">
    <span class="ico">✅</span>Known
  </button>
  <div class="bnav-sep"></div>
  <button class="bnav-btn" id="bnNext" onclick="next()">
    <span class="ico">▶</span>Next
  </button>
</div>

<script>
const D = [

// ────────────────────────────────────────────────────────
// 1. SALUTATIONS
// ────────────────────────────────────────────────────────
{id:'greetings',emoji:'👋',name:'Salutations',color:'#e74c3c',cards:[
{f:'Bonjour',p:'bon-ZHOOR',e:'Hello / Good Morning',s:'Bonjour! Comment ça va aujourd\'hui?',st:'Hello! How are you today?',tip:'Used from morning until ~6pm. Most important French word!'},
{f:'Bonsoir',p:'bon-SWAHR',e:'Good Evening',s:'Bonsoir tout le monde! Bien dormi?',st:'Good evening everyone! Did you sleep well?',tip:'Bon = good, soir = evening. Use after 6pm.'},
{f:'Bonne nuit',p:'bon NWEE',e:'Good Night',s:'Bonne nuit, papa! Je vais dormir.',st:'Good night, dad! I\'m going to sleep.',tip:'Only said at bedtime — NOT as a general goodbye!'},
{f:'Salut!',p:'sa-LUH',e:'Hi! (casual)',s:'Salut! Tu viens jouer avec nous?',st:'Hi! Are you coming to play with us?',tip:'Casual only — never use with strangers or teachers!'},
{f:'Enchanté(e)',p:'on-shon-TAY',e:'Nice to meet you',s:'Enchanté! Je m\'appelle Ahmed. Et vous?',st:'Nice to meet you! My name is Ahmed. And you?',tip:'Add -e for female speaker: enchantée.'},
{f:'Au revoir',p:'o ruh-VWAHR',e:'Goodbye',s:'Au revoir, Madame! À demain!',st:'Goodbye, Ma\'am! See you tomorrow!',tip:'Formal goodbye. Au = to the, revoir = see again.'},
{f:'À bientôt',p:'ah byehn-TOH',e:'See you soon',s:'À bientôt, mon ami! Bonne journée!',st:'See you soon, my friend! Have a good day!',tip:'bientôt = soon. Casual and friendly.'},
{f:'À demain',p:'ah duh-MAN',e:'See you tomorrow',s:'Au revoir! À demain en classe de français!',st:'Goodbye! See you tomorrow in French class!',tip:'demain = tomorrow. Perfect end-of-class goodbye!'},
{f:'À plus tard',p:'ah pluh TAHR',e:'See you later',s:'À plus tard! Je dois rentrer à la maison.',st:'See you later! I have to go home.',tip:'Also shortened to "À plus!" in casual speech.'},
{f:'Comment ça va?',p:'ko-MON sa VA',e:'How are you?',s:'Bonjour Marie! Comment ça va aujourd\'hui?',st:'Hello Marie! How are you today?',tip:'Literally "How does it go?" Very commonly used.'},
{f:'Ça va bien!',p:'sa va BYEHN',e:'I\'m doing well!',s:'Ça va bien, merci! Et toi, comment tu vas?',st:'I\'m doing well, thanks! And you, how are you?',tip:'Also: Ça va? = Are you OK? Simple response: Ça va. = OK.'},
{f:'Très bien, merci',p:'treh BYEHN mehr-SEE',e:'Very well, thank you',s:'Je vais très bien, merci! Et vous, Monsieur?',st:'I\'m doing very well, thank you! And you, Sir?',tip:'Formal and polite. Very common reply.'},
{f:'Et toi?',p:'ay TWAH',e:'And you? (informal)',s:'Ça va! Et toi, tu vas bien?',st:'I\'m fine! And you, are you doing well?',tip:'Use with friends, classmates, same age.'},
{f:'Et vous?',p:'ay VOO',e:'And you? (formal)',s:'Je vais très bien, merci. Et vous, Madame?',st:'I\'m very well, thank you. And you, Ma\'am?',tip:'Use with teachers, elders, strangers.'},
{f:'Merci',p:'mehr-SEE',e:'Thank you',s:'Merci beaucoup pour ton aide avec le français!',st:'Thank you very much for your help with French!',tip:'Merci beaucoup = thank you very much. Add beaucoup for emphasis!'},
{f:'De rien',p:'duh RYEHN',e:'You\'re welcome',s:'Merci pour le livre! — De rien, c\'est normal!',st:'Thanks for the book! — You\'re welcome, it\'s nothing!',tip:'Literally "of nothing". Je vous en prie = more formal.'},
{f:'S\'il vous plaît',p:'seel voo PLEH',e:'Please (formal)',s:'Un café et un croissant, s\'il vous plaît!',st:'A coffee and a croissant, please!',tip:'Literally "if it pleases you". S\'il te plaît = informal version.'},
{f:'Excusez-moi',p:'ex-kew-ZAY MWAH',e:'Excuse me (formal)',s:'Excusez-moi, monsieur. Où est la gare?',st:'Excuse me, sir. Where is the train station?',tip:'Also used to get someone\'s attention. Excuse-moi = informal.'},
{f:'Pardon',p:'par-DON',e:'Sorry / Pardon',s:'Pardon! Je n\'ai pas compris. Pouvez-vous répéter?',st:'Sorry! I didn\'t understand. Can you repeat?',tip:'Quick apology or asking someone to repeat.'},
{f:'D\'accord',p:'da-KOR',e:'OK / Agreed',s:'On se retrouve à midi? — D\'accord, pas de problème!',st:'We meet at noon? — OK, no problem!',tip:'Very common in conversation. Like saying "sure" or "alright".'},
{f:'Bonne journée!',p:'bon zhoor-NAY',e:'Have a good day!',s:'Au revoir, bonne journée et à demain!',st:'Goodbye, have a good day and see you tomorrow!',tip:'Say when LEAVING someone during the day.'},
{f:'Bon après-midi',p:'bon na-preh-mee-DEE',e:'Good afternoon',s:'Bon après-midi! Profitez bien du soleil!',st:'Good afternoon! Enjoy the sunshine!',tip:'Note the liaison: bon-après sounds like "bon-na-pray".'},
{f:'Bonne chance!',p:'bon SHONS',e:'Good luck!',s:'Bonne chance pour ton examen de français!',st:'Good luck on your French exam!',tip:'Chance in French means LUCK, not a chance/opportunity!'},
{f:'Bienvenue!',p:'byehn-vuh-NEW',e:'Welcome!',s:'Bienvenue en classe de français! Je m\'appelle Sukhmanpreet.',st:'Welcome to French class! My name is Sukhmanpreet.',tip:'"bien venu" = well come. Makes perfect sense!'},
{f:'Désolé(e)',p:'day-zo-LAY',e:'Sorry (apology)',s:'Désolé, je suis en retard pour le cours!',st:'Sorry, I\'m late for class!',tip:'More serious than pardon. Add -e if you\'re female: désolée.'},
{f:'Monsieur',p:'muh-SYUH',e:'Sir / Mr.',s:'Bonjour, Monsieur! Comment allez-vous?',st:'Hello, Sir! How are you?',tip:'Abbreviation: M. Always respectful with strangers and teachers.'},
{f:'Madame',p:'ma-DAM',e:'Ma\'am / Mrs.',s:'Excusez-moi, Madame, où est la bibliothèque?',st:'Excuse me, Ma\'am, where is the library?',tip:'Abbreviation: Mme. More polite than Mademoiselle in modern French.'},
{f:'Je m\'appelle...',p:'zhuh ma-PEL',e:'My name is...',s:'Bonjour! Je m\'appelle Ahmed. J\'apprends le français.',st:'Hello! My name is Ahmed. I\'m learning French.',tip:'Literally "I call myself". From the verb s\'appeler (to be called).'},
{f:'Comment tu t\'appelles?',p:'ko-MON tuh ta-PEL',e:'What\'s your name? (informal)',s:'Bonjour! Comment tu t\'appelles? Je m\'appelle Léa.',st:'Hello! What\'s your name? My name is Léa.',tip:'Formal version: Comment vous appelez-vous?'},
{f:'Oui',p:'WEE',e:'Yes',s:'Tu parles français? — Oui, un peu!',st:'Do you speak French? — Yes, a little!',tip:'Simple yes! Sounds like "wee"!'},
{f:'Non',p:'NON',e:'No',s:'Tu as un stylo? — Non, je n\'ai pas de stylo.',st:'Do you have a pen? — No, I don\'t have a pen.',tip:'Simple no! Clear nasal sound.'},
]},

// ────────────────────────────────────────────────────────
// 2. ALPHABET
// ────────────────────────────────────────────────────────
{id:'alphabet',emoji:'🔤',name:'Alphabet',color:'#2980b9',cards:[
{f:'A',p:'ah',e:'A — as in father',s:'A comme avion! L\'avion est dans le ciel.',st:'A as in airplane! The airplane is in the sky.',tip:'A is for avion (airplane). Sounds like "ah" in spa.'},
{f:'B',p:'bay',e:'B',s:'B comme bonjour! Bonjour tout le monde!',st:'B as in hello! Hello everyone!',tip:'Say "bay" not "bee". B is for bonjour!'},
{f:'C',p:'say',e:'C',s:'C comme café! Je bois un café le matin.',st:'C as in coffee! I drink a coffee in the morning.',tip:'Before A/O/U: hard K sound. Before E/I: soft S. ç is always S!'},
{f:'D',p:'day',e:'D',s:'D comme dimanche! Dimanche, je me repose.',st:'D as in Sunday! On Sunday, I rest.',tip:'Say "day". D is for dimanche (Sunday).'},
{f:'E',p:'uh',e:'E — like "uh" in "the"',s:'E comme école! Je vais à l\'école chaque jour.',st:'E as in school! I go to school every day.',tip:'Most common letter in French. Soft "uh" sound. É, È, Ê are different!'},
{f:'F',p:'eff',e:'F',s:'F comme famille! J\'adore ma famille.',st:'F as in family! I love my family.',tip:'Same as English F. F is for famille (family).'},
{f:'G',p:'zhay',e:'G',s:'G comme garçon! Le garçon joue au football.',st:'G as in boy! The boy plays football.',tip:'"zhay" — that ZH is a French J sound. Before A/O/U: hard G. Before E/I: ZH sound.'},
{f:'H',p:'ash (SILENT)',e:'H — ALWAYS SILENT!',s:'H comme hôpital! L\'hôpital est grand.',st:'H as in hospital! The hospital is big.',tip:'⚠️ ALWAYS silent! hôpital = oh-pee-TAL. homme = om. Never pronounce H!'},
{f:'I',p:'ee',e:'I — like "ee" in feet',s:'I comme île! L\'île est très belle.',st:'I as in island! The island is very beautiful.',tip:'Long "ee" sound — like feet or bee.'},
{f:'J',p:'zhee',e:'J',s:'J comme jolie! Elle est très jolie.',st:'J as in pretty! She is very pretty.',tip:'French J sounds like "s" in "measure" or "zh". Very different from English J!'},
{f:'K',p:'kah',e:'K',s:'K comme koala! Le koala dort dans l\'arbre.',st:'K as in koala! The koala sleeps in the tree.',tip:'K is rare in French — mostly in foreign words.'},
{f:'L',p:'ell',e:'L',s:'L comme lampe! La lampe est sur la table.',st:'L as in lamp! The lamp is on the table.',tip:'Same as English L. L is for lampe.'},
{f:'M',p:'emm',e:'M',s:'M comme maison! Ma maison est grande.',st:'M as in house! My house is big.',tip:'M is for maison (house).'},
{f:'N',p:'enn',e:'N',s:'N comme nuit! La nuit, les étoiles brillent.',st:'N as in night! At night, the stars shine.',tip:'N is for nuit (night).'},
{f:'O',p:'oh',e:'O — like "oh"',s:'O comme orange! Je mange une orange le matin.',st:'O as in orange! I eat an orange in the morning.',tip:'Clear "oh" sound. O is for orange.'},
{f:'P',p:'pay',e:'P',s:'P comme père! Mon père est très gentil.',st:'P as in father! My father is very kind.',tip:'Say "pay". P is for père (father).'},
{f:'Q',p:'koo',e:'Q',s:'Q comme question! J\'ai une question, Madame!',st:'Q as in question! I have a question, Ma\'am!',tip:'Always followed by U in French: qui, que, quoi, quand.'},
{f:'R',p:'ehr (GUTTURAL!)',e:'R — from the throat!',s:'R comme rouge! La rose est rouge.',st:'R as in red! The rose is red.',tip:'🌟 Make it in your THROAT like gargling! Practice: rouge, rose, rue, Paris.'},
{f:'S',p:'ess',e:'S',s:'S comme soleil! Le soleil brille aujourd\'hui.',st:'S as in sun! The sun is shining today.',tip:'Between two vowels, S sounds like Z! maison = may-ZON.'},
{f:'T',p:'tay',e:'T',s:'T comme table! La table est dans la salle à manger.',st:'T as in table! The table is in the dining room.',tip:'Crisp T sound. T is for table.'},
{f:'U',p:'ew (round lips!)',e:'U — unique French sound!',s:'U comme université! Je vais à l\'université.',st:'U as in university! I go to university.',tip:'🌟 Say "ee" then ROUND your lips! Like kissing. Practice: tu, lune, bureau, sur.'},
{f:'V',p:'vay',e:'V',s:'V comme voiture! J\'ai une voiture rouge.',st:'V as in car! I have a red car.',tip:'Say "vay". V is for voiture (car).'},
{f:'W',p:'doo-bluh-vay',e:'W — double V!',s:'W comme week-end! Le week-end, je me repose.',st:'W as in weekend! On weekends, I rest.',tip:'"double-V" in French! Very rare — mostly in foreign words.'},
{f:'X',p:'eeks',e:'X',s:'X comme xylophone! Le xylophone est un instrument.',st:'X as in xylophone! The xylophone is an instrument.',tip:'Says "eeks". Rare at start of words.'},
{f:'Y',p:'ee-grek',e:'Y — Greek I!',s:'Y comme yeux! Ses yeux sont bleus.',st:'Y as in eyes! His eyes are blue.',tip:'"i grec" (Greek I) in French. Rare in French words.'},
{f:'Z',p:'zed',e:'Z',s:'Z comme zèbre! Le zèbre est noir et blanc.',st:'Z as in zebra! The zebra is black and white.',tip:'Like British "zed". Z is for zèbre (zebra).'},
]},

// ────────────────────────────────────────────────────────
// 3. ÊTRE
// ────────────────────────────────────────────────────────
{id:'etre',emoji:'⚡',name:'Verbe Être',color:'#8e44ad',cards:[
{f:'Être = To Be',p:'EHT-r',e:'To be (infinitive)',s:'Être ou ne pas être, c\'est la question!',st:'To be or not to be, that is the question!',tip:'Être is IRREGULAR — must memorize all forms. Used for identity, description.'},
{f:'Je suis',p:'zhuh SWEE',e:'I am',s:'Je suis étudiant en français depuis un mois.',st:'I have been a French student for one month.',tip:'Memory: "zhuh SWEE like a bee" — I am buzzing!'},
{f:'Tu es',p:'tuh EH',e:'You are (informal)',s:'Tu es très intelligent et travailleur!',st:'You are very smart and hardworking!',tip:'Tu = informal you. Use with friends, family, children.'},
{f:'Il est',p:'eel EH',e:'He is',s:'Il est mon meilleur ami depuis cinq ans.',st:'He has been my best friend for five years.',tip:'Il = he/it (masculine). Same sound as elle est!'},
{f:'Elle est',p:'el EH',e:'She is',s:'Elle est professeure de français très sympathique.',st:'She is a very nice French teacher.',tip:'Elle = she/it (feminine). Il est & elle est sound identical!'},
{f:'Nous sommes',p:'noo SOM',e:'We are',s:'Nous sommes dans la classe de français maintenant.',st:'We are in French class right now.',tip:'Sommes only ever used with nous. Unique form!'},
{f:'Vous êtes',p:'voo ZET',e:'You are (formal/plural)',s:'Vous êtes très gentil, Monsieur le professeur.',st:'You are very kind, Mr. teacher.',tip:'Vous = formal OR group of people. The ê has accent circonflexe.'},
{f:'Ils sont',p:'eel SON',e:'They are (m./mixed)',s:'Ils sont canadiens et ils parlent français.',st:'They are Canadian and they speak French.',tip:'Ils = masculine group OR mixed group. The S of ils is silent.'},
{f:'Elles sont',p:'el SON',e:'They are (feminine)',s:'Elles sont intelligentes et très amusantes.',st:'They are smart and very funny.',tip:'Elles = all-female group ONLY. Same sound as ils sont.'},
{f:'C\'est un/une...',p:'say tan / ewn',e:'This is a...',s:'C\'est un livre de français très utile!',st:'This is a very useful French book!',tip:'C\'est = it is / this is. For naming things.'},
{f:'Ce sont des...',p:'suh son day',e:'These are some...',s:'Ce sont des élèves très sérieux et motivés.',st:'These are very serious and motivated students.',tip:'Plural of c\'est un/une. Ce sont = these are.'},
{f:'Être + profession',p:'no article!',e:'To be + job (no article!)',s:'Je suis médecin. Elle est professeure. Il est dentiste.',st:'I am a doctor. She is a teacher. He is a dentist.',tip:'⚠️ No article before profession after être! NOT "je suis UN médecin".'},
]},

// ────────────────────────────────────────────────────────
// 4. AVOIR
// ────────────────────────────────────────────────────────
{id:'avoir',emoji:'💪',name:'Verbe Avoir',color:'#16a085',cards:[
{f:'Avoir = To Have',p:'a-VWAHR',e:'To have (infinitive)',s:'Avoir un chien, c\'est beaucoup de responsabilité!',st:'Having a dog is a lot of responsibility!',tip:'Avoir is IRREGULAR and essential. Used for possessions, age, feelings!'},
{f:'J\'ai',p:'ZHAY',e:'I have',s:'J\'ai un chien, deux chats et un poisson rouge.',st:'I have a dog, two cats and a goldfish.',tip:'Memory: ZHAY sounds like "Jay" — Jay has it all!'},
{f:'Tu as',p:'tuh AH',e:'You have (informal)',s:'Tu as un beau stylo rouge! C\'est ton préféré?',st:'You have a beautiful red pen! Is it your favourite?',tip:'Simple "ah" sound. Tu + as = you have (informal).'},
{f:'Il a',p:'eel AH',e:'He has',s:'Il a un grand appartement dans le centre de Paris.',st:'He has a big apartment in the centre of Paris.',tip:'Very short — just "AH"! Same sound as elle a.'},
{f:'Elle a',p:'el AH',e:'She has',s:'Elle a les yeux bleus et les cheveux bruns.',st:'She has blue eyes and brown hair.',tip:'Elle a = il a, same sound! Context tells you which one.'},
{f:'Nous avons',p:'noo za-VON',e:'We have',s:'Nous avons un cours de français chaque mardi.',st:'We have a French class every Tuesday.',tip:'🔊 LIAISON! Nous avons → "noo-ZA-von". The S links to A.'},
{f:'Vous avez',p:'voo za-VAY',e:'You have (formal/plural)',s:'Vous avez des questions sur le cours d\'aujourd\'hui?',st:'Do you have any questions about today\'s class?',tip:'🔊 LIAISON! Vous avez → "voo-ZA-vay". The S links to A.'},
{f:'Ils ont',p:'eel ZON',e:'They have (masculine)',s:'Ils ont beaucoup de livres dans leur bibliothèque.',st:'They have many books in their library.',tip:'🔊 LIAISON! Ils ont → "eel-ZON". The S links to O.'},
{f:'Elles ont',p:'el ZON',e:'They have (feminine)',s:'Elles ont des amies françaises très sympas.',st:'They have very nice French friends.',tip:'Same sound as ils ont! Watch spelling: Elles not Ils.'},
{f:'J\'ai un livre',p:'zhay an LEEVR',e:'I have a book',s:'J\'ai un livre de grammaire française très complet.',st:'I have a very complete French grammar book.',tip:'un = masculine article. Always learn the article with the noun!'},
{f:'Il a un chien',p:'eel ah an SHYEHN',e:'He has a dog',s:'Il a un chien qui s\'appelle Rex et qui est très gentil.',st:'He has a dog named Rex who is very kind.',tip:'un chien (m). chien → "shyehn". Liaison: il a UN chien.'},
{f:'Avoir vs Être',p:'different uses!',e:'Have vs Be',s:'J\'AI faim. (avoir) — Je SUIS étudiant. (être)',st:'I am hungry (avoir) — I am a student (être).',tip:'⚠️ KEY: feelings use AVOIR. Identity/description use ÊTRE. Very different from English!'},
]},

// ────────────────────────────────────────────────────────
// 5. AVOIR EXPRESSIONS
// ────────────────────────────────────────────────────────
{id:'avoir_expr',emoji:'💬',name:'Expressions Avoir',color:'#d35400',cards:[
{f:'J\'ai chaud',p:'zhay SHOH',e:'I am hot',s:'J\'ai très chaud! Tu peux ouvrir la fenêtre, s\'il te plaît?',st:'I\'m very hot! Can you open the window please?',tip:'🌟 French uses AVOIR for body feelings! "I HAVE heat" not "I am hot".'},
{f:'J\'ai froid',p:'zhay FWAH',e:'I am cold',s:'J\'ai froid! Ferme la porte, il fait -10 degrés dehors!',st:'I\'m cold! Close the door, it\'s -10 degrees outside!',tip:'froid = cold (adjective too). "FWAH" — like the cold wind blowing!'},
{f:'J\'ai faim',p:'zhay FAN',e:'I am hungry',s:'J\'ai très faim! Il est midi et je n\'ai pas mangé.',st:'I\'m very hungry! It\'s noon and I haven\'t eaten.',tip:'faim = hunger. "I have hunger" — very French logic!'},
{f:'J\'ai soif',p:'zhay SWAF',e:'I am thirsty',s:'J\'ai soif après le sport. Je voudrais de l\'eau.',st:'I\'m thirsty after sport. I would like some water.',tip:'soif = thirst. SWAF — so thirsty you can\'t breathe!'},
{f:'J\'ai sommeil',p:'zhay so-MAY',e:'I am sleepy',s:'J\'ai sommeil. Je vais dormir tôt ce soir.',st:'I\'m sleepy. I\'m going to sleep early tonight.',tip:'sommeil = sleep. So-MAY — humming yourself to sleep.'},
{f:'J\'ai peur',p:'zhay PUHR',e:'I am scared',s:'J\'ai peur des araignées! Elles me font peur.',st:'I\'m scared of spiders! They scare me.',tip:'peur = fear. PUHR — a scared cat purrs with fear!'},
{f:'J\'ai tort',p:'zhay TOR',e:'I am wrong',s:'Excuse-moi, j\'ai tort. La réponse est 15, pas 16.',st:'Sorry, I\'m wrong. The answer is 15, not 16.',tip:'tort = wrong. Like "tort" in law (a wrongdoing). Easy!'},
{f:'J\'ai raison',p:'zhay reh-ZON',e:'I am right',s:'Oui! J\'ai raison! C\'est bien la bonne réponse!',st:'Yes! I\'m right! That is indeed the correct answer!',tip:'raison = reason. "I have reason" = I am right. Very logical!'},
{f:'J\'ai de la chance',p:'zhay duh la SHONS',e:'I am lucky',s:'J\'ai de la chance d\'apprendre le français avec une bonne prof!',st:'I\'m lucky to be learning French with a good teacher!',tip:'Chance in French = LUCK (not chance). I have luck!'},
{f:'J\'ai envie de...',p:'zhay on-VEE duh',e:'I want to / I feel like...',s:'J\'ai envie de manger une pizza ce soir!',st:'I feel like eating a pizza tonight!',tip:'envie = desire/craving. J\'ai envie de + infinitive.'},
{f:'J\'ai [X] ans',p:'zhay [X] ON',e:'I am [X] years old',s:'J\'ai quinze ans et j\'apprends le français depuis un mois.',st:'I am 15 years old and I\'ve been learning French for one month.',tip:'🌟 Age uses AVOIR! J\'ai 15 ans = I AM 15 years old. "I have 15 years".'},
{f:'Avoir chaud / froid / faim / soif',p:'a-VWAHR',e:'Pattern: avoir + state',s:'En été j\'ai chaud, en hiver j\'ai froid, et toujours j\'ai faim!',st:'In summer I\'m hot, in winter I\'m cold, and I\'m always hungry!',tip:'These 4 are the most common avoir expressions — drill them together!'},
]},

// ────────────────────────────────────────────────────────
// 6. ARTICLES
// ────────────────────────────────────────────────────────
{id:'articles',emoji:'📌',name:'Articles',color:'#2c3e50',cards:[
{f:'un',p:'AN',e:'a / an (masculine)',s:'J\'ai un stylo bleu et un cahier rouge.',st:'I have a blue pen and a red notebook.',tip:'Masculine singular indefinite article. Always learn nouns WITH their article!'},
{f:'une',p:'UHN',e:'a / an (feminine)',s:'C\'est une belle maison avec une grande fenêtre.',st:'This is a beautiful house with a big window.',tip:'Feminine singular indefinite. une = UHN, not oon!'},
{f:'des',p:'DAY',e:'some (plural)',s:'Il y a des livres et des stylos sur la table.',st:'There are books and pens on the table.',tip:'Plural indefinite for ALL genders. des livres, des tables. Always DAY!'},
{f:'le',p:'LUH',e:'the (masculine singular)',s:'Le chat dort sur le lit. Le garçon lit son livre.',st:'The cat sleeps on the bed. The boy reads his book.',tip:'Becomes L\' before vowel or silent H! le + hôpital = l\'hôpital.'},
{f:'la',p:'LA',e:'the (feminine singular)',s:'La chambre est grande. La lampe est belle.',st:'The bedroom is big. The lamp is beautiful.',tip:'Becomes L\' before vowel or silent H! la + armoire = l\'armoire.'},
{f:'l\'',p:'L (elided)',e:'the (before vowel/H)',s:'L\'horloge sonne. L\'enfant joue. L\'armoire est bleue.',st:'The clock rings. The child plays. The wardrobe is blue.',tip:'Used before any noun starting with a vowel or silent H. No gender shown!'},
{f:'les',p:'LAY',e:'the (all plurals)',s:'Les élèves étudient. Les livres sont sur les tables.',st:'The students study. The books are on the tables.',tip:'Works for BOTH masculine and feminine plurals. Always LAY.'},
{f:'un → le',p:'AN → LUH',e:'a → the (masc.)',s:'J\'ai UN stylo. LE stylo est rouge.',st:'I have A pen. THE pen is red.',tip:'First mention = un/une. Already known = le/la. Same logic as English!'},
{f:'une → la',p:'UHN → LA',e:'a → the (fem.)',s:'J\'ai UNE table. LA table est grande.',st:'I have A table. THE table is big.',tip:'Indefinite first, then definite. Just like English "a" vs "the"!'},
{f:'pas de / pas d\'',p:'pah duh',e:'not any (after negation)',s:'Je n\'ai pas de stylo. Je n\'ai pas d\'ami.',st:'I don\'t have a pen. I don\'t have a friend.',tip:'⚠️ After negation: un/une/des → de/d\'! This is a key French rule.'},
]},

// ────────────────────────────────────────────────────────
// 7. PHONETICS
// ────────────────────────────────────────────────────────
{id:'phonetics',emoji:'🔊',name:'Phonétique',color:'#1abc9c',cards:[
{f:'OU',p:'OO',e:'like "oo" in food',s:'Bonjour! Vous voulez du loup ou du mouton?',st:'Hello! Do you want wolf or sheep? (practice ou)',tip:'ou = oo. bonjour = bon-ZHOOR. vous = VOO. toujours = too-ZHOOR.'},
{f:'OI',p:'WAH',e:'like "wa" in water',s:'Moi, toi, je crois que la voiture est noire.',st:'Me, you, I think the car is black. (practice oi)',tip:'oi = wah. moi = MWAH. toi = TWAH. voiture = vwah-TOOR.'},
{f:'UI',p:'WEE',e:'like "wee"',s:'La nuit, je suis fatigué, puis je dors.',st:'At night, I am tired, then I sleep. (practice ui)',tip:'ui = wee. nuit = NWEE. puis = PWEE. je suis = zhuh SWEE.'},
{f:'EU',p:'UH (rounded)',e:'lips rounded, say "uh"',s:'Je veux deux œufs avec du beurre, s\'il vous plaît.',st:'I want two eggs with butter, please. (practice eu)',tip:'eu = uh with rounded lips. deux = DUH. veux = VUH. bleu = BLUH.'},
{f:'É (accent aigu)',p:'AY',e:'clear "ay" like in "say"',s:'L\'été est une belle saison. J\'aime les cafés.',st:'Summer is a beautiful season. I like cafés.',tip:'é = ay. Only on E! été = ay-TAY. café = ka-FAY. étudiant = ay-tew-DYOHN.'},
{f:'È / Ê',p:'EH',e:'open "eh" like in "bed"',s:'Mon père et ma mère préfèrent la fenêtre ouverte.',st:'My father and mother prefer the open window.',tip:'è/ê = eh. père = PEHR. fenêtre = fuh-NEHTR. tête = TET.'},
{f:'Accent Circonflexe (^)',p:'hat/caret accent',e:'Lengthens vowel; marks old S',s:'L\'hôpital, le château, la tête, la forêt.',st:'The hospital, the castle, the head, the forest.',tip:'hôtel used to be "hostel"! ^ replaced the S. forêt = forest. tête = head.'},
{f:'Cédille (ç)',p:'SS sound',e:'Makes C sound like S',s:'Le garçon français mange un café avec une cuillère.',st:'The French boy drinks coffee with a spoon.',tip:'Without ç: CA=KA, CO=KO. With ç: ÇA=SA, ÇO=SO. garçon, français, leçon.'},
{f:'-TION / -SION / -XION',p:'SYON',e:'all sound like "syon"',s:'L\'attention et la connexion sont importantes.',st:'Attention and connection are important.',tip:'attention = a-ton-SYON. connexion = ko-nex-SYON. occasion = o-ka-ZYON.'},
{f:'-GN',p:'NY',e:'like "ny" in canyon',s:'L\'Allemagne est un beau pays avec des montagnes.',st:'Germany is a beautiful country with mountains.',tip:'Allemagne = al-MAN-y. mignon = mee-NYON. Montagne = mon-TAN-y. compagne = kom-PAN-y.'},
{f:'Liaison',p:'sound bridge',e:'Linking consonant to next vowel',s:'Les enfants ont un ami et ils adorent les animaux.',st:'The children have a friend and they love animals.',tip:'les enfants = lay-ZON-fon. ils ont = eel-ZON. vous avez = voo-ZA-vay. Key in fluency!'},
{f:'H muet',p:'always silent',e:'H is ALWAYS silent!',s:'L\'homme habite à l\'hôpital, près d\'un hôtel.',st:'The man lives at the hospital, near a hotel.',tip:'hôpital = oh-pee-TAL. homme = om. heure = UHR. habiter = a-bee-TAY. Never H!'},
]},

// 8. CLASSROOM

{id:'classroom',emoji:'🏫',name:'Salle de Classe',color:'#8e44ad',cards:[

{f:'une chaise',p:'ewn SHEHZ',e:'a chair',s:'Je m\'assieds sur ma chaise et j\'ouvre mon livre.',st:'I sit on my chair and I open my book.',tip:'Feminine. la chaise. SHEHZ — like a fancy chaise longue!'},
{f:'un stylo',p:'an stee-LOH',e:'a pen',s:'J\'écris avec un stylo bleu dans mon cahier.',st:'I write with a blue pen in my notebook.',tip:'Masculine. Think "stylus" — same Greek root!'},
{f:'un crayon',p:'an kra-YON',e:'a pencil',s:'Je dessine avec un crayon et j\'efface avec une gomme.',st:'I draw with a pencil and erase with an eraser.',tip:'⚠️ In French, crayon = PENCIL, not wax crayon! Crayon de couleur = coloured pencil.'},
{f:'une table',p:'ewn TABL',e:'a table',s:'Les livres et les stylos sont sur la table.',st:'The books and pens are on the table.',tip:'Feminine. Almost same as English!'},
{f:'un cartable',p:'an kar-TABL',e:'a school bag',s:'Je mets mes livres dans mon cartable chaque matin.',st:'I put my books in my school bag every morning.',tip:'Masculine. Specifically a school bag, not just any bag.'},
{f:'une trousse',p:'ewn TROOS',e:'a pencil case',s:'Dans ma trousse, j\'ai des stylos, des crayons et une gomme.',st:'In my pencil case, I have pens, pencils and an eraser.',tip:'Feminine. TROOS — tools for writing are in la trousse!'},
{f:'un tableau',p:'an ta-BLOH',e:'a blackboard / board',s:'La professeure écrit les nouveaux mots sur le tableau.',st:'The teacher writes the new words on the board.',tip:'Masculine. Also means "painting"! Un tableau noir = blackboard.'},
{f:'un cahier',p:'an ka-YAY',e:'a notebook / exercise book',s:'J\'écris mes devoirs dans mon cahier de français.',st:'I write my homework in my French notebook.',tip:'Masculine. ka-YAY. "Okay-yay!" for a notebook.'},
{f:'une gomme',p:'ewn GOM',e:'an eraser',s:'J\'utilise une gomme quand je fais une erreur.',st:'I use an eraser when I make a mistake.',tip:'Feminine. Think "gum" — both erasers and gum are rubbery!'},
{f:'une règle',p:'ewn RAYGL',e:'a ruler',s:'Je mesure la ligne avec ma règle de 30 cm.',st:'I measure the line with my 30cm ruler.',tip:'Feminine. Also means "rule"! Rulers and rules are both straight!'},
{f:'une fenêtre',p:'ewn fuh-NEHTR',e:'a window',s:'La fenêtre est ouverte et il fait beau dehors.',st:'The window is open and the weather is nice outside.',tip:'Feminine. "Defenestration" = throwing someone out a window!'},
{f:'une porte',p:'ewn PORT',e:'a door',s:'Ferme la porte, s\'il te plaît! Il fait froid.',st:'Close the door, please! It\'s cold.',tip:'Feminine. Think "portal" or "airport" (port = gate/door).'},
{f:'une horloge',p:'ewn or-LOZH',e:'a clock',s:'L\'horloge indique qu\'il est neuf heures du matin.',st:'The clock shows that it is nine in the morning.',tip:'Feminine. L\'horloge (note the L\'!). or-LOZH.'},
{f:'un globe',p:'an GLOB',e:'a globe',s:'Je trouve le Canada sur le globe terrestre.',st:'I find Canada on the globe.',tip:'Masculine. Same as English!'},
{f:'une professeure',p:'ewn pro-fuh-SUHR',e:'a (female) teacher',s:'Notre professeure de français est très patiente et dynamique.',st:'Our French teacher is very patient and dynamic.',tip:'Female: professeure. Male: professeur (no extra e). Note the distinction!'},
{f:'un professeur',p:'an pro-fuh-SUHR',e:'a (male) teacher',s:'Le professeur explique la grammaire française très bien.',st:'The teacher explains French grammar very well.',tip:'Male teacher OR gender-neutral. Informal: le prof.'},
{f:'une poubelle',p:'ewn poo-BEL',e:'a bin / trash can',s:'Mets les déchets dans la poubelle, s\'il te plaît.',st:'Put the rubbish in the bin, please.',tip:'Named after Eugène Poubelle who invented trash cans! poo-BEL.'},
{f:'un garçon',p:'an gar-SON',e:'a boy',s:'Le garçon s\'appelle Marc et il a dix ans.',st:'The boy is named Marc and he is ten years old.',tip:'Masculine. The ç = soft S sound. gar-SON.'},
{f:'une fille',p:'ewn FEE-y',e:'a girl',s:'La fille s\'appelle Sophie et elle parle français parfaitement.',st:'The girl is named Sophie and she speaks French perfectly.',tip:'Feminine. The LL sounds like Y. FEE-y. Also means "daughter"!'},
{f:'une affiche',p:'ewn a-FEESH',e:'a poster',s:'Il y a une belle affiche de Paris sur le mur de la classe.',st:'There is a beautiful Paris poster on the classroom wall.',tip:'Feminine. a-FEESH. Afficher = to display/post.'},
]},

// ────────────────────────────────────────────────────────
// 9. MA CHAMBRE
// ────────────────────────────────────────────────────────
{id:'chambre',emoji:'🛏️',name:'Ma Chambre',color:'#e67e22',cards:[
{f:'la chambre',p:'la SHOMBR',e:'the bedroom',s:'Ma chambre est grande et très confortable. J\'aime ma chambre!',st:'My bedroom is big and very comfortable. I love my room!',tip:'Feminine. la chambre → les chambres. The room is the HW topic!'},
{f:'le lit',p:'luh LEE',e:'the bed',s:'Mon lit est grand et confortable. Je dors bien!',st:'My bed is big and comfortable. I sleep well!',tip:'Masculine. le lit → les lits. LEE — like "lee-way". The T is silent!'},
{f:'l\'armoire',p:'lar-MWAHR',e:'the wardrobe / closet',s:'Mon armoire est bleue et il y a beaucoup de vêtements dedans.',st:'My wardrobe is blue and there are many clothes inside.',tip:'Feminine (starts with vowel → l\'). lar-MWAHR.'},
{f:'la lampe',p:'la LOMP',e:'the lamp',s:'La lampe est sur ma table de nuit. Elle éclaire bien.',st:'The lamp is on my bedside table. It lights up well.',tip:'Feminine. Almost same as English! la LOMP.'},
{f:'l\'horloge',p:'lor-LOZH',e:'the clock',s:'Mon horloge sonne à sept heures chaque matin.',st:'My clock rings at seven every morning.',tip:'Feminine (H is silent → l\'). lor-LOZH. Also un réveil = an alarm clock.'},
{f:'les ballons',p:'lay ba-LON',e:'the balloons / balls',s:'Il y a des ballons colorés dans le coin de ma chambre.',st:'There are colourful balloons in the corner of my room.',tip:'Masculine plural. les ballons. ba-LON.'},
{f:'la peinture',p:'la pehn-TOOR',e:'the painting',s:'Il y a une belle peinture de la nature sur mon mur.',st:'There is a beautiful nature painting on my wall.',tip:'Feminine. Also means "paint" (material). pehn-TOOR.'},
{f:'la fenêtre',p:'la fuh-NEHTR',e:'the window',s:'Ma fenêtre donne sur le jardin. La vue est magnifique!',st:'My window looks out on the garden. The view is magnificent!',tip:'Feminine. Same word as in classroom vocabulary!'},
{f:'la porte',p:'la PORT',e:'the door',s:'Je ferme la porte de ma chambre quand j\'étudie.',st:'I close my bedroom door when I study.',tip:'Feminine. Same word as classroom door!'},
{f:'il y a',p:'eel ee AH',e:'there is / there are',s:'Dans ma chambre, il y a un lit, une armoire et une lampe.',st:'In my bedroom, there is a bed, a wardrobe and a lamp.',tip:'🌟 KEY PHRASE! il y a + singular = there IS. il y a + plural = there ARE.'},
{f:'J\'ai une grande chambre',p:'zhay ewn grond SHOMBR',e:'I have a big bedroom',s:'J\'ai une grande chambre avec beaucoup de fenêtres.',st:'I have a big bedroom with many windows.',tip:'grande = big (feminine). Goes BEFORE chambre — BAGS adjective!'},
{f:'Le lit est grand',p:'luh lee eh GRON',e:'The bed is big',s:'Le lit est grand et très confortable pour dormir.',st:'The bed is big and very comfortable to sleep in.',tip:'grand (masculine, no -e). Adjective AFTER noun in predicate position.'},
{f:'La lampe et la peinture sont belles',p:'lay BEL',e:'The lamp and the painting are beautiful',s:'La lampe et la peinture sont belles et décoratives.',st:'The lamp and the painting are beautiful and decorative.',tip:'belles = plural feminine of beau/belle. Both items are feminine!'},
{f:'J\'aime ma chambre',p:'zhem ma SHOMBR',e:'I love my room',s:'J\'aime ma chambre parce qu\'elle est calme et confortable.',st:'I love my room because it is calm and comfortable.',tip:'J\'aime = I like/love. Ma = my (feminine). Use for your room paragraph!'},
]},

// ────────────────────────────────────────────────────────
// 10. ADJECTIVES
// ────────────────────────────────────────────────────────
{id:'adjectives',emoji:'✨',name:'Les Adjectifs',color:'#c0392b',cards:[
{f:'petit / petite',p:'puh-TEE / puh-TEET',e:'small / short',s:'J\'ai un petit chat et une petite souris.',st:'I have a small cat and a small mouse.',tip:'BAGS — goes BEFORE noun! un petit chat, une petite maison. The feminine adds -E and you hear the T!'},
{f:'grand / grande',p:'GRON / GROND',e:'big / tall',s:'Mon grand frère est grand et il aime le sport.',st:'My big brother is tall and he likes sport.',tip:'BAGS! un grand homme (D silent), une grande femme (D + E). GRON vs GROND!'},
{f:'gros / grosse',p:'GROH / GROS',e:'fat / thick / big',s:'Il a un gros sac et une grosse valise pour le voyage.',st:'He has a big bag and a large suitcase for the trip.',tip:'BAGS! gros (silent S) → grosse (doubles S, says it). un gros chien, une grosse pomme.'},
{f:'vieux / vieille',p:'VYUH / VYAY',e:'old',s:'Mon vieux grand-père et ma vieille grand-mère sont gentils.',st:'My old grandfather and my old grandmother are kind.',tip:'BAGS! Before vowel: vieil (un vieil homme). vieux/vieille — very irregular forms!'},
{f:'nouveau / nouvelle',p:'noo-VOH / noo-VEL',e:'new',s:'J\'ai un nouveau livre et une nouvelle trousse pour l\'école.',st:'I have a new book and a new pencil case for school.',tip:'BAGS! Before vowel: nouvel (un nouvel ami). noo-VOH / noo-VEL.'},
{f:'beau / belle',p:'BOH / BEL',e:'handsome / beautiful',s:'C\'est un beau garçon et c\'est une belle fille!',st:'He\'s a handsome boy and she\'s a beautiful girl!',tip:'BAGS! Before vowel: bel (un bel homme). Plural: beaux / belles. BOH / BEL.'},
{f:'bon / bonne',p:'BON / BON',e:'good',s:'J\'ai un bon professeur et une bonne classe de français.',st:'I have a good teacher and a good French class.',tip:'BAGS! bon (nasal N) / bonne (double N, not nasal!). Different sounds!'},
{f:'mauvais / mauvaise',p:'mo-VAY / mo-VEZ',e:'bad',s:'Ce film est mauvais mais la musique est mauvaise aussi.',st:'This film is bad but the music is bad too.',tip:'Usually AFTER noun. un film mauvais. The feminine changes the vowel sound!'},
{f:'jeune',p:'ZHUHN',e:'young',s:'Les jeunes élèves apprennent le français rapidement.',st:'The young students learn French quickly.',tip:'BAGS! Un jeune homme. Same for m. and f. — no change! ZHUHN.'},
{f:'joli / jolie',p:'zho-LEE',e:'pretty',s:'Elle porte une jolie robe et elle a de jolis yeux.',st:'She wears a pretty dress and she has pretty eyes.',tip:'BAGS! une jolie fille, un joli garçon. Same pronunciation m. and f.!'},
{f:'laid / laide',p:'LAY / LED',e:'ugly',s:'Ce bâtiment est laid mais l\'intérieur est très beau.',st:'This building is ugly but the interior is very beautiful.',tip:'After noun. un garçon laid, une fille laide. Opposite of joli!'},
{f:'marrant / marrante',p:'ma-RON / ma-RONT',e:'funny',s:'Mon meilleur ami est très marrant! Il me fait toujours rire.',st:'My best friend is very funny! He always makes me laugh.',tip:'Casual/colloquial. After noun. Double R! Il est marrant.'},
{f:'intelligent / intelligente',p:'an-tel-ee-ZHON / ZHONT',e:'smart / intelligent',s:'Elle est très intelligente et a toujours de bonnes notes.',st:'She is very smart and always gets good grades.',tip:'After noun. Feminine adds -E and the T is now heard! ZHON → ZHONT.'},
{f:'gentil / gentille',p:'zhon-TEE / zhon-TEE-y',e:'kind / nice',s:'Mon professeur est très gentil et patient avec nous.',st:'My teacher is very kind and patient with us.',tip:'Gentil (silent L) → gentille (LL sounds like Y). Very irregular feminine!'},
{f:'méchant / méchante',p:'may-SHON / may-SHONT',e:'naughty / mean',s:'Le méchant loup est dans la forêt sombre.',st:'The mean wolf is in the dark forest.',tip:'Opposite of gentil! BAGS sometimes for emphasis. The T is heard in feminine!'},
{f:'mignon / mignonne',p:'mee-NYON / mee-NYON',e:'cute',s:'Le chat est tellement mignon! Et son petit chaton aussi!',st:'The cat is so cute! And his little kitten too!',tip:'Can go before noun. Double N in feminine (different nasal quality). mee-NYON.'},
{f:'triste',p:'TREEST',e:'sad',s:'Je suis triste aujourd\'hui parce que mon ami est parti.',st:'I\'m sad today because my friend left.',tip:'After noun. Same for m. and f.! Il est triste / Elle est triste. TREEST.'},
{f:'sympathique / sympa',p:'sam-pa-TEEK / SAM-pa',e:'nice / likeable',s:'Tous les étudiants de cette classe sont très sympathiques!',st:'All the students in this class are very likeable!',tip:'Sympa = informal shortcut. NEVER changes form! Elle est sympa. Ils sont sympa.'},
{f:'mince',p:'MANS',e:'thin / slim',s:'Le modèle est très mince et grand.',st:'The model is very slim and tall.',tip:'Same for m. and f.! Il est mince / Elle est mince. MANS.'},
{f:'bête',p:'BET',e:'stupid / silly',s:'Ne sois pas bête! C\'est une bonne idée!',st:'Don\'t be silly! That\'s a good idea!',tip:'Same for m. and f.! Note the accent circumflex on ê. BET.'},
{f:'timide',p:'tee-MEED',e:'shy / timid',s:'Il est timide en classe mais avec ses amis il parle beaucoup.',st:'He is shy in class but with his friends he talks a lot.',tip:'Same for m. and f.! tee-MEED.'},
]},

// ────────────────────────────────────────────────────────
// 11. COLORS
// ────────────────────────────────────────────────────────
{id:'colors',emoji:'🎨',name:'Les Couleurs',color:'#e74c3c',cards:[
{f:'rouge',p:'ROOZH',e:'red',s:'La pomme est rouge et elle est délicieuse.',st:'The apple is red and it is delicious.',tip:'Same for m. and f.! un stylo rouge, une voiture rouge. ROOZH.'},
{f:'bleu / bleue',p:'BLUH',e:'blue',s:'Le ciel est bleu et la mer est bleue aussi.',st:'The sky is blue and the sea is also blue.',tip:'Add -E for feminine. Same pronunciation! un ciel bleu, une mer bleue. BLUH.'},
{f:'vert / verte',p:'VEHR / VERT',e:'green',s:'Le jardin est vert et les arbres ont des feuilles vertes.',st:'The garden is green and the trees have green leaves.',tip:'Feminine sounds the T! vert = VEHR (silent T). verte = VERT (T heard!).'},
{f:'jaune',p:'ZHOHN',e:'yellow',s:'Le soleil est jaune et les tournesols sont jaunes.',st:'The sun is yellow and the sunflowers are yellow.',tip:'Same for m. and f.! un canari jaune, une banane jaune. ZHOHN.'},
{f:'noir / noire',p:'NWAHR',e:'black',s:'Mon chat est noir et ma robe est noire.',st:'My cat is black and my dress is black.',tip:'Add -E for feminine, same pronunciation! un chat noir, une robe noire. NWAHR.'},
{f:'blanc / blanche',p:'BLON / BLONSH',e:'white',s:'Le nuage est blanc et la neige est blanche.',st:'The cloud is white and the snow is white.',tip:'⚠️ Very different feminine! blanc (silent C) → blanche (BLONSH). Remember!'},
{f:'gris / grise',p:'GREE / GREEZ',e:'grey',s:'Le ciel est gris et les pierres sont grises en hiver.',st:'The sky is grey and the stones are grey in winter.',tip:'Feminine S is now heard! gris (silent S = GREE) → grise (GREEZ).'},
{f:'rose',p:'ROHZ',e:'pink',s:'Elle porte une robe rose avec des chaussures roses.',st:'She wears a pink dress with pink shoes.',tip:'Same for m. and f.! un flamant rose, une fleur rose. ROHZ.'},
{f:'violet / violette',p:'vyo-LAY / vyo-LET',e:'purple',s:'Les violettes sont violettes et les iris sont violets.',st:'Violets are purple and irises are purple.',tip:'Doubles the T in feminine! violet (silent T) → violette (T heard). vyo-LAY/LET.'},
{f:'orange',p:'o-RONZH',e:'orange',s:'La citrouille est orange et les carottes sont orange.',st:'The pumpkin is orange and the carrots are orange.',tip:'⚠️ INVARIABLE! NEVER changes: un pull orange, des chaussures orange. Foreign word!'},
{f:'marron',p:'ma-RON',e:'brown',s:'Le chocolat est marron et les chaussures sont marron.',st:'The chocolate is brown and the shoes are brown.',tip:'⚠️ INVARIABLE! Never changes: des bottes marron, une table marron. Foreign word!'},
{f:'brun / brune',p:'BRAN / BRUN',e:'brown (hair)',s:'Elle est brune avec les yeux noirs. Lui, il est brun aussi.',st:'She has dark brown hair with black eyes. He has dark hair too.',tip:'This one DOES change! Used for hair/complexion only. Il est brun / Elle est brune.'},
]},

// ────────────────────────────────────────────────────────
// 12. NATIONALITIES
// ────────────────────────────────────────────────────────
{id:'nationalities',emoji:'🌍',name:'Nationalités',color:'#2980b9',cards:[
{f:'français / française',p:'fron-SAY / fron-SEZ',e:'French',s:'Il est français et il habite à Lyon, en France.',st:'He is French and he lives in Lyon, France.',tip:'⚠️ NOT capitalized in French! Je suis français. La France (capital) → français (not).'},
{f:'américain / américaine',p:'a-may-ree-KAN / KEN',e:'American',s:'Elle est américaine et elle vient de New York.',st:'She is American and she comes from New York.',tip:'les États-Unis = the United States. américain/e.'},
{f:'canadien / canadienne',p:'ka-na-DYEHN',e:'Canadian',s:'Je suis canadien et j\'habite à Calgary.',st:'I am Canadian and I live in Calgary.',tip:'Double N in feminine: canadienne. Le Canada → canadien.'},
{f:'anglais / anglaise',p:'on-GLAY / on-GLEZ',e:'English / British',s:'Il est anglais et il vient de Londres en Angleterre.',st:'He is English and he comes from London in England.',tip:'l\'Angleterre = England. anglais/e. Note: aise = GLEZ.'},
{f:'allemand / allemande',p:'al-MON / al-MOND',e:'German',s:'Elle est allemande et elle parle trois langues.',st:'She is German and she speaks three languages.',tip:'l\'Allemagne = Germany. aal-mahn-ye → allemand.'},
{f:'espagnol / espagnole',p:'es-pa-NYOL',e:'Spanish',s:'Il est espagnol et il joue du flamenco.',st:'He is Spanish and he plays flamenco.',tip:'l\'Espagne = Spain. The -gn sounds like "ny"!'},
{f:'italien / italienne',p:'ee-ta-LYEHN',e:'Italian',s:'Elle est italienne et elle cuisine très bien.',st:'She is Italian and she cooks very well.',tip:'l\'Italie = Italy. Double N in feminine: italienne.'},
{f:'japonais / japonaise',p:'zha-po-NAY / NEZ',e:'Japanese',s:'Il est japonais et il habite à Tokyo.',st:'He is Japanese and he lives in Tokyo.',tip:'le Japon = Japan. nayz sound in feminine!'},
{f:'brésilien / brésilienne',p:'bray-zee-LYEHN',e:'Brazilian',s:'Elle est brésilienne et elle aime le carnaval de Rio.',st:'She is Brazilian and she loves the Rio carnival.',tip:'le Brésil = Brazil. Double N in feminine. Note the accent on é!'},
{f:'belge',p:'BELZH',e:'Belgian',s:'Il est belge et il adore le chocolat belge!',st:'He is Belgian and he loves Belgian chocolate!',tip:'la Belgique = Belgium. Same form for m. and f.! BELZH.'},
{f:'marocain / marocaine',p:'ma-ro-KAN / KEN',e:'Moroccan',s:'Elle est marocaine et elle parle arabe et français.',st:'She is Moroccan and she speaks Arabic and French.',tip:'le Maroc = Morocco. ma-ro-KAN.'},
{f:'indien / indienne',p:'an-DYEHN',e:'Indian',s:'Il est indien et il vient de Mumbai en Inde.',st:'He is Indian and he comes from Mumbai in India.',tip:'l\'Inde = India. Double N in feminine: indienne.'},
]},

// ────────────────────────────────────────────────────────
// 13. NUMBERS
// ────────────────────────────────────────────────────────
{id:'numbers',emoji:'🔢',name:'Les Nombres',color:'#27ae60',cards:[
{f:'0 — zéro',p:'ZAY-roh',e:'zero',s:'Il fait zéro degré aujourd\'hui. Il fait très froid!',st:'It\'s zero degrees today. It\'s very cold!',tip:'zéro — same as English! ZAY-roh.'},
{f:'1 — un / une',p:'AN / UHN',e:'one',s:'J\'ai un frère et une sœur. Une famille parfaite!',st:'I have one brother and one sister. A perfect family!',tip:'💡 un = masc. une = fem. J\'ai UN chien, UNE chatte.'},
{f:'2 — deux',p:'DUH',e:'two',s:'J\'ai deux chats qui s\'appellent Mimi et Lulu.',st:'I have two cats named Mimi and Lulu.',tip:'💡 Sounds like "duh" — 2 is duh-obvious! Before vowel: "duh-ZAN" (deux amis).'},
{f:'3 — trois',p:'TWAH',e:'three',s:'J\'ai trois sœurs. Nous sommes quatre enfants.',st:'I have three sisters. We are four children.',tip:'💡 TWAH — think ballet "pas de trois"! Three-letter word for 3.'},
{f:'4 — quatre',p:'KAT-r',e:'four',s:'Il y a quatre saisons: printemps, été, automne, hiver.',st:'There are four seasons: spring, summer, autumn, winter.',tip:'💡 KAT-r — a cat has 4 legs! Cat-re.'},
{f:'5 — cinq',p:'SANK',e:'five',s:'J\'ai cinq doigts sur chaque main.',st:'I have five fingers on each hand.',tip:'💡 SANK — 5 sailors whose ship SANK!'},
{f:'6 — six',p:'SEES',e:'six',s:'Il y a six jours que j\'étudie le français.',st:'It has been six days since I started studying French.',tip:'💡 SEES — you need 6 eyes to see everything! Before vowel: SEEZ.'},
{f:'7 — sept',p:'SET',e:'seven',s:'Il y a sept jours dans une semaine.',st:'There are seven days in a week.',tip:'💡 SET — set 7 alarms to wake up! sept = set.'},
{f:'8 — huit',p:'WEET',e:'eight',s:'Il y a huit heures dans ma journée scolaire.',st:'There are eight hours in my school day.',tip:'💡 WEET — rhymes with wheat! 8 grains of wheat.'},
{f:'9 — neuf',p:'NUHF',e:'nine',s:'Le chat a neuf vies, c\'est ce qu\'on dit!',st:'The cat has nine lives, so they say!',tip:'💡 neuf ALSO means NEW in French! neuf ans = 9 years old / new years!'},
{f:'10 — dix',p:'DEES',e:'ten',s:'Il y a dix élèves dans notre groupe de français.',st:'There are ten students in our French group.',tip:'💡 DEES — dix sounds like "dees". Ten fingers, dees!'},
{f:'11 — onze',p:'ONZ',e:'eleven',s:'Il est onze heures du matin. Le cours commence!',st:'It is eleven in the morning. Class starts!',tip:'⚠️ Unique! Must memorize. ONZ — think "ounce" of eleven.'},
{f:'12 — douze',p:'DOOZ',e:'twelve',s:'Il y a douze mois dans une année.',st:'There are twelve months in a year.',tip:'💡 A DOZEN = douze! Easy connection. DOOZ.'},
{f:'13 — treize',p:'TREHZ',e:'thirteen',s:'J\'ai treize ans et j\'apprends le français.',st:'I am thirteen years old and I am learning French.',tip:'⚠️ Unique! TREHZ — think "tres" (Spanish 3) + Z.'},
{f:'14 — quatorze',p:'ka-TORZ',e:'fourteen',s:'Le quatorze juillet est la fête nationale française.',st:'July 14th is the French national holiday (Bastille Day).',tip:'⚠️ Unique! ka-TORZ. Quatre (4) is hiding inside!'},
{f:'15 — quinze',p:'KANZ',e:'fifteen',s:'Le cours dure quinze minutes de plus aujourd\'hui.',st:'Class lasts fifteen extra minutes today.',tip:'⚠️ Unique! KANZ. Last five before the pattern starts.'},
{f:'16 — seize',p:'SEZ',e:'sixteen',s:'À seize ans, on peut passer le permis de conduire en France.',st:'At sixteen, you can take the driving test in France.',tip:'⚠️ LAST unique number! After 16, follow the pattern.'},
{f:'17 — dix-sept',p:'dee-SET',e:'ten-seven = 17',s:'J\'ai étudié le français pendant dix-sept jours.',st:'I have studied French for seventeen days.',tip:'🌟 PATTERN! dix (10) + sept (7) = 17. Ten + seven!'},
{f:'18 — dix-huit',p:'dee-WEET',e:'ten-eight = 18',s:'À dix-huit ans, on est majeur en France.',st:'At eighteen, you are an adult in France.',tip:'dix (10) + huit (8) = 18. dee-WEET!'},
{f:'19 — dix-neuf',p:'dee-NUHF',e:'ten-nine = 19',s:'Il y a dix-neuf élèves dans ma classe.',st:'There are nineteen students in my class.',tip:'dix (10) + neuf (9) = 19. dee-NUHF!'},
{f:'20 — vingt',p:'VAN',e:'twenty',s:'J\'ai vingt livres de français dans ma bibliothèque.',st:'I have twenty French books in my library.',tip:'💡 VAN — 20 people fit in a VAN! vingt = VAN.'},
{f:'21 — vingt et un',p:'van-TAY-AN',e:'twenty and one = 21',s:'Mon père a vingt et un ans de plus que moi.',st:'My father is twenty-one years older than me.',tip:'⚠️ EXCEPTION: use "ET" (and) ONLY for 21, 31, 41, 51, 61, 71!'},
{f:'22 — vingt-deux',p:'van-DUH',e:'twenty-two',s:'Il y a vingt-deux élèves dans la classe de maths.',st:'There are twenty-two students in the maths class.',tip:'No "et" from 22 onwards! Just combine: vingt-DEUX.'},
{f:'25 — vingt-cinq',p:'van-SANK',e:'twenty-five',s:'Il y a vingt-cinq lettres... non, vingt-six dans l\'alphabet!',st:'There are twenty-five... no, twenty-six letters in the alphabet!',tip:'vingt (20) + cinq (5). van-SANK!'},
{f:'30 — trente',p:'TRONT',e:'thirty',s:'Mon frère a trente ans et il est médecin.',st:'My brother is thirty and he is a doctor.',tip:'💡 TRONT — thirty is TRONT-astic! A new base number.'},
{f:'31 — trente et un',p:'tront-AY-AN',e:'thirty and one = 31',s:'Il y a trente et un jours en janvier.',st:'There are thirty-one days in January.',tip:'ET again for 31! trente ET un. Same rule as 21.'},
{f:'33 — trente-trois',p:'tront-TWAH',e:'thirty-three',s:'J\'ai trente-trois livres dans ma bibliothèque.',st:'I have thirty-three books in my library.',tip:'trente (30) + trois (3). tront-TWAH! We learned 33 in class!'},
{f:'40 — quarante',p:'ka-RONT',e:'forty',s:'Il y a quarante élèves dans la grande salle.',st:'There are forty students in the large room.',tip:'💡 ka-RONT — sounds like "carrot" almost! 40 carrots.'},
{f:'50 — cinquante',p:'san-KONT',e:'fifty',s:'Il y a cinquante états aux États-Unis.',st:'There are fifty states in the United States.',tip:'💡 san-KONT — cinq (5) is hiding inside: cinq-uante!'},
{f:'60 — soixante',p:'swa-SONT',e:'sixty',s:'Il y a soixante minutes dans une heure.',st:'There are sixty minutes in an hour.',tip:'💡 swa-SONT — the LAST "normal" number. After 60, the tricks begin!'},
{f:'🌟 70 — soixante-dix',p:'swa-sont-DEES',e:'sixty-TEN = 70!',s:'Il y a soixante-dix pays où l\'on parle français!',st:'There are seventy countries where French is spoken!',tip:'🎯 NO "seventy" in French! 60+10=70. soixante-DIX. This is unique to French!'},
{f:'71 — soixante et onze',p:'swa-sont-AY-ONZ',e:'sixty-eleven = 71',s:'Ma grand-mère a soixante et onze ans.',st:'My grandmother is seventy-one years old.',tip:'60+11! soixante ET onze. ET appears because of 11 (onze)!'},
{f:'75 — soixante-quinze',p:'swa-sont-KANZ',e:'sixty-fifteen = 75',s:'Il fait soixante-quinze degrés Fahrenheit dehors.',st:'It is seventy-five degrees Fahrenheit outside.',tip:'60+15! soixante-quinze. You\'re literally adding 60+15!'},
{f:'🌟 80 — quatre-vingts',p:'kat-r-VAN',e:'FOUR-TWENTIES = 80!',s:'Ma ville a quatre-vingts mille habitants.',st:'My city has eighty thousand inhabitants.',tip:'🎯 4×20=80! French math! Note: no -S when followed by another number: quatre-vingt-UN.'},
{f:'81 — quatre-vingt-un',p:'kat-r-van-AN',e:'four-twenty-one = 81',s:'Mon grand-père a quatre-vingt-un ans!',st:'My grandfather is eighty-one years old!',tip:'No "et" here! quatre-vingt-un (not "et un"). 4×20+1=81.'},
{f:'🌟 90 — quatre-vingt-dix',p:'kat-r-van-DEES',e:'FOUR-TWENTY-TEN = 90!',s:'Ce bâtiment a quatre-vingt-dix ans.',st:'This building is ninety years old.',tip:'🎯 4×20+10=90! The wildest number in French math! quatre-vingt-DIX.'},
{f:'91 — quatre-vingt-onze',p:'kat-r-van-ONZ',e:'four-twenty-eleven = 91',s:'Il y a quatre-vingt-onze personnes dans le hall.',st:'There are ninety-one people in the hall.',tip:'quatre-vingt + onze. 4×20+11=91. French math strikes again!'},
{f:'100 — cent',p:'SON',e:'one hundred',s:'Il y a cent élèves dans notre école de langues.',st:'There are one hundred students in our language school.',tip:'💡 SON — cent sounds like "son". Un siècle = 100 years = a century!'},
{f:'TRICK: 70, 80, 90',p:'the big three!',e:'The 3 special numbers',s:'soixante-dix (70) + dix = 80 quatre-vingts + dix = 90 quatre-vingt-dix',st:'sixty-ten (70), four-twenties (80), four-twenty-ten (90).',tip:'🎯 REMEMBER: 70=60+10, 80=4×20, 90=4×20+10. Master these and you know 1-100!'},
]},

// ────────────────────────────────────────────────────────
// 14. VERBE ALLER  (14 juillet)
// ────────────────────────────────────────────────────────
{id:'aller',emoji:'🚶',name:'Verbe Aller',color:'#2471a3',cards:[
{f:'Aller = To Go',p:'a-LAY',e:'To go (infinitive)',s:'Aller au parc, c\'est amusant le weekend!',st:'Going to the park is fun on the weekend!',tip:'Aller is IRREGULAR — used for movement AND to build the near future (aller + infinitif).'},
{f:'Je vais',p:'zhuh VAY',e:'I am going / I go',s:'Je vais à l\'école tous les jours en autobus.',st:'I go to school every day by bus.',tip:'Je vais also starts the near future: je vais manger = I am going to eat.'},
{f:'Tu vas',p:'tuh VAH',e:'You are going (informal)',s:'Tu vas au cinéma avec tes amis ce soir?',st:'Are you going to the movies with your friends tonight?',tip:'Tu vas — informal you. Short and simple, just "vah".'},
{f:'Il/Elle va',p:'eel/el VAH',e:'He/She is going',s:'Il va à la bibliothèque pour étudier le français.',st:'He is going to the library to study French.',tip:'Same sound for il and elle — context tells you which one!'},
{f:'Nous allons',p:'noo za-LON',e:'We are going',s:'Nous allons en France pendant les vacances d\'été.',st:'We are going to France during the summer holidays.',tip:'🔊 LIAISON! Nous allons → "noo-za-LON". Looks closer to a regular -ER verb.'},
{f:'Vous allez',p:'voo za-LAY',e:'You are going (formal/plural)',s:'Vous allez très bien apprendre le français, Madame!',st:'You are going to learn French very well, Ma\'am!',tip:'🔊 LIAISON! Vous allez → "voo-za-LAY".'},
{f:'Ils/Elles vont',p:'eel/el VON',e:'They are going',s:'Ils vont au marché pour acheter des fruits.',st:'They are going to the market to buy fruit.',tip:'⚠️ Very irregular — just memorize "vont"! Nothing like the infinitive aller.'},
]},

// ────────────────────────────────────────────────────────
// 15. VERBE FAIRE  (14 juillet)
// ────────────────────────────────────────────────────────
{id:'faire',emoji:'🔨',name:'Verbe Faire',color:'#a04000',cards:[
{f:'Faire = To Do/Make',p:'FEHR',e:'To do / to make (infinitive)',s:'Faire ses devoirs chaque soir est important.',st:'Doing your homework every evening is important.',tip:'Faire is IRREGULAR and one of the most useful French verbs — used in tons of expressions!'},
{f:'Je fais',p:'zhuh FAY',e:'I do / I make',s:'Je fais mes devoirs de français après l\'école.',st:'I do my French homework after school.',tip:'Short and simple — zhuh FAY.'},
{f:'Tu fais',p:'tuh FAY',e:'You do / you make (informal)',s:'Tu fais du sport le weekend?',st:'Do you play sports on the weekend?',tip:'Same sound as je fais! Context tells you who.'},
{f:'Il/Elle fait',p:'eel/el FAY',e:'He/She does / makes',s:'Elle fait un gâteau pour l\'anniversaire de son frère.',st:'She is making a cake for her brother\'s birthday.',tip:'Still sounds like "fay" — but spelled fait.'},
{f:'Nous faisons',p:'noo fuh-ZON',e:'We do / we make',s:'Nous faisons nos devoirs de français ensemble.',st:'We do our French homework together.',tip:'⚠️ Tricky! Faisons is pronounced "fuh-zon" — NOT "fay-zon". A unique sound!'},
{f:'Vous faites',p:'voo FET',e:'You do / you make (formal/plural)',s:'Vous faites très attention en classe, les élèves!',st:'You pay very close attention in class, students!',tip:'⚠️ Irregular! Doesn\'t follow the normal -ez pattern like other verbs.'},
{f:'Ils/Elles font',p:'eel/el FON',e:'They do / they make',s:'Ils font une promenade dans le parc après le dîner.',st:'They go for a walk in the park after dinner.',tip:'⚠️ Totally irregular — "font" doesn\'t look like "faire" at all! Memorize it.'},
]},

// ────────────────────────────────────────────────────────
// 16. LA NÉGATION  (14 juillet)
// ────────────────────────────────────────────────────────
{id:'negation',emoji:'🚫',name:'La Négation',color:'#922b21',cards:[
{f:'ne...pas',p:'nuh ... PAH',e:'not (basic negation)',s:'Je ne parle pas espagnol, seulement français.',st:'I don\'t speak Spanish, only French.',tip:'🌟 THE key structure: ne (n\') + verb + pas wraps around the verb like a sandwich!'},
{f:'Je n\'aime pas',p:'zhuh nem PAH',e:'I don\'t like',s:'Je n\'aime pas les épinards, mais j\'aime les carottes.',st:'I don\'t like spinach, but I like carrots.',tip:'Ne becomes n\' before a vowel sound: j\'aime → je n\'aime pas.'},
{f:'Je ne suis pas',p:'zhuh nuh swee PAH',e:'I am not',s:'Je ne suis pas fatigué aujourd\'hui, je suis plein d\'énergie!',st:'I am not tired today, I\'m full of energy!',tip:'Negative of être: je suis → je ne suis pas.'},
{f:'Elle n\'est pas',p:'el neh PAH',e:'She is not',s:'Elle n\'est pas gentille avec son petit frère aujourd\'hui.',st:'She is not kind to her little brother today.',tip:'The adjective itself never changes in the negative — only the verb is wrapped.'},
{f:'Tu n\'as pas de...',p:'tew nah pah duh',e:'You don\'t have a/any...',s:'Tu n\'as pas de chat, mais tu as un chien.',st:'You don\'t have a cat, but you have a dog.',tip:'⚠️ KEY RULE: un/une/des become DE after a negation! Tu as un chat → tu n\'as pas de chat.'},
{f:'Il n\'y a pas de...',p:'eel nee ah PAH duh',e:'There isn\'t/aren\'t any...',s:'Il n\'y a pas de stylo sur la table, seulement un livre.',st:'There is no pen on the table, only a book.',tip:'Negative of il y a. Il y a un livre → il n\'y a pas de livre.'},
{f:'le/la/les (négation)',p:'no change!',e:'Definite articles: no change',s:'J\'aime le café. — Je n\'aime pas le café.',st:'I like coffee. — I don\'t like coffee.',tip:'Definite articles (le, la, les) NEVER change in the negative — only un/une/des do!'},
]},

// ────────────────────────────────────────────────────────
// 17. VERBES -IR  (14 juillet)
// ────────────────────────────────────────────────────────
{id:'ir_verbs',emoji:'📗',name:'Verbes -IR',color:'#117864',cards:[
{f:'Finir = To Finish',p:'fee-NEER',e:'To finish (infinitive)',s:'Finir ses devoirs avant le dîner, c\'est une bonne habitude.',st:'Finishing your homework before dinner is a good habit.',tip:'Finir is a REGULAR -IR verb — the second family of regular verbs after -ER!'},
{f:'Je finis',p:'zhuh fee-NEE',e:'I finish',s:'Je finis mes devoirs de français à six heures.',st:'I finish my French homework at six o\'clock.',tip:'-IR verbs: je + stem + is. finis = fee-NEE (the s is silent).'},
{f:'Tu finis',p:'tew fee-NEE',e:'You finish (informal)',s:'Tu finis ton livre ce soir?',st:'Are you finishing your book tonight?',tip:'Same ending as je: -is. Same sound as je finis!'},
{f:'Il/Elle finit',p:'eel/el fee-NEE',e:'He/She finishes',s:'Elle finit son examen de français avant tout le monde.',st:'She finishes her French exam before everyone else.',tip:'Ends in -it, still sounds like fee-NEE (the t is silent).'},
{f:'Nous finissons',p:'noo fee-nee-SON',e:'We finish',s:'Nous finissons notre projet de français cette semaine.',st:'We are finishing our French project this week.',tip:'🌟 Notice the extra -iss- in the plural forms — the hallmark of -IR verbs!'},
{f:'Vous finissez',p:'voo fee-nee-SAY',e:'You finish (formal/plural)',s:'Vous finissez toujours vos devoirs à temps, bravo!',st:'You always finish your homework on time, well done!',tip:'-issez ending. Same -iss- pattern as nous finissons.'},
{f:'Ils/Elles finissent',p:'eel/el fee-NEES',e:'They finish',s:'Ils finissent la classe de français à quinze heures.',st:'They finish French class at three o\'clock.',tip:'-issent ending (silent -ent). Try conjugating punir and choisir the same way!'},
{f:'choisir',p:'shwah-ZEER',e:'to choose',s:'Je choisis un livre à la bibliothèque chaque semaine.',st:'I choose a book at the library every week.',tip:'Regular -IR verb, same pattern as finir.'},
{f:'réussir',p:'ray-oo-SEER',e:'to succeed',s:'Elle réussit toujours ses examens de français.',st:'She always succeeds at her French exams.',tip:'Regular -IR verb — réussir à quelque chose = to succeed at something.'},
{f:'grandir',p:'gron-DEER',e:'to grow',s:'Les enfants grandissent très vite pendant l\'été.',st:'Children grow very fast during the summer.',tip:'Regular -IR verb. Same family as finir, choisir, réussir.'},
{f:'obéir',p:'o-bay-EER',e:'to obey',s:'Le chien obéit à son maître immédiatement.',st:'The dog obeys its owner immediately.',tip:'Regular -IR verb — obéir à quelqu\'un = to obey someone.'},
{f:'remplir',p:'rom-PLEER',e:'to fill',s:'Je remplis mon cahier de nouveaux mots français.',st:'I fill my notebook with new French words.',tip:'Regular -IR verb, same endings as finir.'},
{f:'maigrir / grossir',p:'may-GREER / gro-SEER',e:'to lose weight / to gain weight',s:'En été je maigris un peu, en hiver je grossis!',st:'In summer I lose a little weight, in winter I gain some!',tip:'Opposites! Both are regular -IR verbs.'},
{f:'réfléchir',p:'ray-flay-SHEER',e:'to think / to reflect',s:'Je réfléchis avant de répondre à la question.',st:'I think before answering the question.',tip:'Longer word but same regular -IR endings as finir.'},
]},

// ────────────────────────────────────────────────────────
// 18. VERBES -RE  (14 juillet)
// ────────────────────────────────────────────────────────
{id:'re_verbs',emoji:'📕',name:'Verbes -RE',color:'#6c3483',cards:[
{f:'Vendre = To Sell',p:'VON-dr',e:'To sell (infinitive)',s:'Vendre des fruits au marché, c\'est le travail de mon oncle.',st:'Selling fruit at the market is my uncle\'s job.',tip:'Vendre is a REGULAR -RE verb — the third family of regular verbs!'},
{f:'Je vends',p:'zhuh VON',e:'I sell',s:'Je vends mes vieux livres de français à mon ami.',st:'I sell my old French books to my friend.',tip:'-RE verbs: je + stem + s. The D is silent — sounds just like "von".'},
{f:'Tu vends',p:'tew VON',e:'You sell (informal)',s:'Tu vends ton vélo ou tu le gardes?',st:'Are you selling your bike or keeping it?',tip:'Same sound as je vends — "von". Same -s ending.'},
{f:'Il/Elle vend',p:'eel/el VON',e:'He/She sells',s:'Elle vend des gâteaux délicieux à la fête de l\'école.',st:'She sells delicious cakes at the school fair.',tip:'⚠️ NO ending at all — just the bare stem! Still sounds like "von".'},
{f:'Nous vendons',p:'noo von-DON',e:'We sell',s:'Nous vendons des billets pour le spectacle de l\'école.',st:'We sell tickets for the school show.',tip:'Now you hear the D! -ons ending, like regular verbs.'},
{f:'Vous vendez',p:'voo von-DAY',e:'You sell (formal/plural)',s:'Vous vendez de belles peintures dans votre magasin.',st:'You sell beautiful paintings in your shop.',tip:'-ez ending, D is pronounced. Same pattern as nous vendons.'},
{f:'Ils/Elles vendent',p:'eel/el VOND',e:'They sell',s:'Ils vendent des fleurs fraîches tous les matins.',st:'They sell fresh flowers every morning.',tip:'-ent ending is silent, but you DO hear the D: "vond".'},
{f:'attendre',p:'a-TON-dr',e:'to wait (for)',s:'J\'attends mon ami devant l\'école.',st:'I am waiting for my friend in front of the school.',tip:'Regular -RE verb — same endings as vendre. Attendre = to wait; assister = to attend!'},
{f:'répondre',p:'ray-PON-dr',e:'to answer',s:'Elle répond correctement à toutes les questions.',st:'She answers all the questions correctly.',tip:'Regular -RE verb. Répondre à une question = to answer a question.'},
{f:'entendre',p:'on-TON-dr',e:'to hear',s:'J\'entends de la musique dans la salle de classe.',st:'I hear music in the classroom.',tip:'Regular -RE verb, same family as vendre and attendre.'},
{f:'perdre',p:'PEHR-dr',e:'to lose',s:'Ne perds pas ton cahier de français!',st:'Don\'t lose your French notebook!',tip:'Regular -RE verb — perdre son temps = to waste one\'s time.'},
{f:'descendre',p:'day-SON-dr',e:'to go down',s:'Nous descendons les escaliers pour aller à la cantine.',st:'We go down the stairs to go to the cafeteria.',tip:'Regular -RE verb, same endings as vendre.'},
{f:'rendre',p:'RON-dr',e:'to give back / to return',s:'Elles rendent les livres à la bibliothèque.',st:'They give the books back to the library.',tip:'Regular -RE verb — straight from today\'s class example sentence!'},
]},
